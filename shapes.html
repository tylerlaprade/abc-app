<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Learn Shapes and Colors — Aria's Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --shape-art-filter: drop-shadow(0 2px 0 rgba(106, 27, 154, 0.22));
    --shape-art-filter-active: drop-shadow(0 1px 0 rgba(106, 27, 154, 0.16));
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    height: 100dvh;
    overflow-x: hidden;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: system-ui, -apple-system, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    background: linear-gradient(180deg, #ede7f6 0%, #e1bee7 38%, #b39ddb 100%);
    padding: 52px 12px 16px;
  }

  body.chase-active {
    overflow: hidden;
    touch-action: none;
  }

  body.session-ended {
    pointer-events: none;
  }

  body.session-ended #session-end-overlay,
  body.session-ended #session-end-overlay * {
    pointer-events: auto;
  }

  .home-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 150;
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 999px;
    border: 3px solid #5e35b1;
    background: #fff;
    color: #4a148c;
    text-decoration: none;
    box-shadow: 0 3px 0 #4527a0;
    -webkit-tap-highlight-color: transparent;
  }

  .home-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #4527a0;
  }

  #mode-buttons {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 6px;
    max-width: 62vw;
  }

  .mode-btn {
    background: #eee;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    font-family: system-ui, -apple-system, sans-serif;
    color: #666;
    cursor: pointer;
  }
  .mode-btn:hover { background: #ddd; }
  .mode-btn.active {
    background: #5e35b1;
    border-color: #4527a0;
    color: #fff;
  }
  .mode-btn.active { pointer-events: none; }

  #app-main {
    width: min(80vw, calc(100% - 24px));
    max-width: 960px;
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .freeplay-hint {
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: clamp(1rem, 3.5vw, 1.2rem);
    font-weight: 600;
    color: #6a1b9a;
    text-align: center;
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  #view-freeplay {
    width: 100%;
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  #view-freeplay[hidden] {
    display: none !important;
  }

  .shape-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, minmax(0, 1fr));
    gap: clamp(8px, 1.5vw, 14px);
    width: 100%;
    flex: 1 1 auto;
    min-height: calc(80dvh - 5.5rem);
    min-height: calc(80vh - 5.5rem);
    padding: 4px 0 12px;
  }

  .shape-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(4px, 1vmin, 10px);
    padding: clamp(8px, 1.5vmin, 14px);
    min-height: 0;
    height: 100%;
    border: 3px solid #fff;
    border-radius: 18px;
    background: linear-gradient(160deg, #fff 0%, #f3e5f5 100%);
    box-shadow: 0 4px 0 #ab47bc;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .shape-tile:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 0 #8e24aa;
  }

  .shape-tile:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #8e24aa;
  }

  .shape-tile.pop {
    animation: tile-pop 0.25s ease-out;
  }

  @keyframes tile-pop {
    0% { transform: scale(0.92); }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .shape-tile { transition: none; }
    .shape-tile:hover { transform: none; }
    .shape-tile.pop { animation: none; }
  }

  /* Same visual treatment in Free play and Quiz: art scales with tile via cqmin; fallbacks below. */
  .shape-tile__emoji {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    width: 100%;
    line-height: 1;
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
    filter: var(--shape-art-filter);
  }

  @supports (container-type: size) {
    .shape-tile {
      container-type: size;
    }

    /* ~80% of tile (cqmin); SVG uses same em box as emoji via height:1em */
    .shape-tile__emoji {
      width: auto;
      height: auto;
      max-width: 80%;
      max-height: 80%;
      font-size: min(80cqmin, 7rem);
    }

    .shape-tile__emoji .shape-tile-svg {
      height: 1em;
      width: auto;
      max-width: 100%;
      display: block;
    }
  }

  @supports not (container-type: size) {
    .shape-tile__emoji {
      max-width: 80%;
      max-height: 80%;
      font-size: clamp(2.75rem, min(16vmin, 20vw), 6.5rem);
    }

    .shape-tile__emoji .shape-tile-svg {
      height: 1em;
      width: auto;
      max-width: 100%;
      display: block;
    }
  }

  .chase-shape--svg .shape-tile-svg {
    width: 1em;
    height: 1em;
    display: block;
  }

  .shape-tile__name {
    flex-shrink: 0;
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: clamp(0.85rem, 2.5vmin, 1.1rem);
    font-weight: 700;
    color: #4a148c;
    text-align: center;
    line-height: 1.15;
  }

  /* Quiz: keep labels in the DOM for accessibility (aria on button); hide visually so kids match by sound + emoji. */
  .shape-grid--quiz .shape-tile__name {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    clip-path: inset(50%);
    white-space: nowrap;
    border: 0;
  }

  /* Quiz layout: top half = replay; bottom half = 6×2 grid, spaced for touch. */
  #app-main.app-main--quiz {
    width: 100%;
    max-width: min(960px, 100%);
    flex: 1 1 auto;
    min-height: 0;
  }

  #view-freeplay.view-freeplay--quiz {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    width: 100%;
  }

  #quiz-top {
    flex: 1 1 50%;
    min-height: 42dvh;
    max-height: 52dvh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(0.35rem, 2vw, 0.85rem);
    padding: 8px 12px 12px;
    box-sizing: border-box;
  }

  #view-freeplay.view-freeplay--quiz #quiz-top:not([hidden]) {
    display: flex;
  }

  .quiz-top__title {
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: clamp(0.95rem, 3.8vw, 1.15rem);
    font-weight: 700;
    color: #4a148c;
    text-align: center;
    max-width: 22ch;
    line-height: 1.25;
  }

  .quiz-top__sub {
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: clamp(0.8rem, 3.2vw, 0.95rem);
    font-weight: 600;
    color: #6a1b9a;
    text-align: center;
    max-width: 26ch;
    line-height: 1.35;
    opacity: 0.95;
  }

  .quiz-replay-btn {
    width: min(38vmin, 11rem);
    height: min(38vmin, 11rem);
    min-width: 7.5rem;
    min-height: 7.5rem;
    border-radius: 50%;
    border: 4px solid #5e35b1;
    background: linear-gradient(165deg, #fff 0%, #f3e5f5 55%, #e1bee7 100%);
    box-shadow: 0 6px 0 #7b1fa2, 0 10px 28px rgba(74, 20, 140, 0.2);
    font-size: min(22vmin, 5rem);
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .quiz-replay-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #7b1fa2, 0 12px 30px rgba(74, 20, 140, 0.22);
  }

  .quiz-replay-btn:active {
    transform: translateY(3px) scale(0.98);
    box-shadow: 0 3px 0 #7b1fa2;
  }

  .view-freeplay--quiz .shape-grid {
    flex: 1 1 50%;
    min-height: 42dvh;
    max-height: 52dvh;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    grid-template-rows: repeat(2, minmax(5.25rem, 1fr));
    gap: clamp(18px, 5vw, 32px);
    padding: clamp(16px, 4vw, 28px) clamp(10px, 3vw, 20px) clamp(20px, 4.5vw, 32px);
    width: 100%;
    min-height: 0;
    align-content: stretch;
    justify-content: center;
  }

  .view-freeplay--quiz .shape-tile {
    position: relative;
    min-height: 3rem;
    min-width: 0;
    height: 100%;
    width: 100%;
    max-width: 100%;
    /* Match free play: avoid clipping emoji/SVG and purple drop-shadow */
    padding: clamp(10px, 2.2vmin, 18px);
    gap: 0;
    justify-content: center;
    align-items: center;
    border-radius: 16px;
    border-width: 3px;
    overflow: visible;
  }

  /* Quiz uses smaller cells — re-assert same art rules as free play (cqmin + 1em SVG). */
  @supports (container-type: size) {
    .shape-grid--quiz .shape-tile__emoji {
      width: auto;
      height: auto;
      max-width: 80%;
      max-height: 80%;
      font-size: min(80cqmin, 7rem);
    }

    .shape-grid--quiz .shape-tile__emoji .shape-tile-svg {
      height: 1em;
      width: auto;
      max-width: 100%;
      display: block;
    }
  }

  @supports not (container-type: size) {
    .shape-grid--quiz .shape-tile__emoji {
      max-width: 80%;
      max-height: 80%;
      font-size: clamp(2.25rem, min(12vmin, 11vw), 5.25rem);
    }

    .shape-grid--quiz .shape-tile__emoji .shape-tile-svg {
      height: 1em;
      width: auto;
      max-width: 100%;
      display: block;
    }
  }

  @media (min-width: 520px) {
    .shape-grid:not(.shape-grid--quiz) {
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, minmax(0, 1fr));
    }
  }

  #play-timer {
    display: none;
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 140;
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(94, 53, 177, 0.92);
    color: #fff;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    pointer-events: none;
  }

  #play-timer.is-visible {
    display: block;
  }

  #session-end-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(0, 0, 0, 0.45);
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  body.session-ended #session-end-overlay {
    display: flex;
  }

  .session-end-card {
    max-width: 24rem;
    width: 100%;
    background: linear-gradient(160deg, #ede7f6 0%, #e1bee7 40%, #ce93d8 100%);
    border-radius: 24px;
    padding: clamp(1.35rem, 4vw, 1.85rem);
    font-family: "Fredoka", system-ui, sans-serif;
    box-shadow:
      0 4px 0 #5e35b1,
      0 16px 48px rgba(0, 0, 0, 0.22);
    border: 4px solid #fff;
    position: relative;
    overflow: hidden;
  }

  .session-end-card::before {
    content: "🔷";
    position: absolute;
    top: 0.5rem;
    right: 0.75rem;
    font-size: 1.75rem;
    opacity: 0.9;
    pointer-events: none;
  }

  .session-end-card::after {
    content: "🎨";
    position: absolute;
    bottom: 3.5rem;
    left: 0.65rem;
    font-size: 1.35rem;
    opacity: 0.85;
    pointer-events: none;
  }

  .session-end-card h2 {
    font-size: clamp(1.5rem, 5.5vw, 1.85rem);
    color: #4a148c;
    margin-bottom: 0.25rem;
    text-align: center;
    text-shadow: 0 2px 0 rgba(255, 255, 255, 0.8);
  }

  .session-end-card .session-end-sub {
    font-size: clamp(0.95rem, 3.2vw, 1.05rem);
    font-weight: 600;
    color: #6a1b9a;
    text-align: center;
    margin-bottom: 1.1rem;
  }

  .session-end-stats {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin: 0 0 1.2rem;
  }

  .score-section {
    border-radius: 16px;
    padding: 0.75rem 0.85rem;
    border: 3px solid rgba(255, 255, 255, 0.95);
    box-shadow: 0 3px 0 rgba(0, 0, 0, 0.08);
  }

  .score-section--free {
    background: linear-gradient(135deg, #fff59d 0%, #dce775 100%);
  }

  .score-section--quiz {
    background: linear-gradient(135deg, #b3e5fc 0%, #81d4fa 100%);
  }

  .score-section--chase {
    background: linear-gradient(135deg, #a5d6a7 0%, #81c784 100%);
  }

  .score-section__head {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.35rem;
  }

  .score-section__icon {
    font-size: 1.35rem;
    line-height: 1;
  }

  .score-section__title {
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    font-weight: 700;
    color: #4a148c;
  }

  .score-section__body {
    font-size: clamp(0.88rem, 3vw, 0.98rem);
    font-weight: 600;
    color: #333;
    line-height: 1.45;
  }

  .score-section--muted .score-section__body {
    color: #555;
    font-weight: 500;
  }

  .score-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.4rem;
  }

  .score-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 2.1rem;
    padding: 0.35rem 0.5rem;
    border-radius: 10px;
    font-size: 1.05rem;
    font-weight: 800;
    background: #fff;
    color: #4a148c;
    border: 2px solid rgba(106, 27, 154, 0.28);
    box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
  }

  .score-celebrate {
    font-size: 0.95rem;
    font-weight: 700;
    color: #4a148c;
  }

  .session-end-home {
    display: block;
    text-align: center;
    font-weight: 600;
    font-size: 1rem;
    padding: 12px 16px;
    border-radius: 999px;
    background: #5e35b1;
    color: #fff;
    text-decoration: none;
    box-shadow: 0 3px 0 #4527a0;
  }

  .session-end-home:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #4527a0;
  }

  #chase-arena {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
  }

  .chase-shape {
    position: absolute;
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    margin: 0;
    padding: 0;
    border: none;
    background: transparent;
    box-shadow: none;
    -webkit-appearance: none;
    appearance: none;
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
    filter: var(--shape-art-filter);
  }

  .chase-shape--svg {
    line-height: 0;
  }

  .chase-shape:focus {
    outline: none;
  }

  .chase-shape:focus-visible {
    outline: 3px solid rgba(94, 53, 177, 0.8);
    outline-offset: 6px;
    border-radius: 12px;
  }

  .chase-shape:active {
    transform: scale(0.92);
    filter: var(--shape-art-filter-active);
  }

  #thumbs-down {
    position: fixed;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15vw;
    display: none;
    z-index: 50;
    animation: shape-shake 0.4s ease-out;
    pointer-events: none;
  }

  @keyframes shape-shake {
    0%, 100% { transform: translateX(-50%) rotate(0deg); }
    20% { transform: translateX(-50%) rotate(-10deg); }
    40% { transform: translateX(-50%) rotate(10deg); }
    60% { transform: translateX(-50%) rotate(-5deg); }
    80% { transform: translateX(-50%) rotate(5deg); }
  }

  .celebration-emoji {
    position: fixed;
    z-index: 55;
    font-size: 12vw;
    pointer-events: none;
    animation: emoji-pop 1.5s ease-out forwards;
  }

  @keyframes emoji-pop {
    0%   { transform: scale(0) rotate(-20deg); opacity: 1; }
    30%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
    50%  { transform: scale(1) rotate(0deg); opacity: 1; }
    100% { transform: scale(1.3) rotate(10deg); opacity: 0; }
  }

  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 60;
    animation: confetti-burst var(--duration) ease-out forwards;
  }

  @keyframes confetti-burst {
    0% {
      transform: translate(0, 0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
      opacity: 0;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .session-end-card::before,
    .session-end-card::after { opacity: 0.5; }
  }

</style>
</head>
<body>

<div id="play-timer" role="status" aria-live="polite" aria-atomic="true"></div>

<div id="session-end-overlay" aria-modal="true" role="dialog" aria-labelledby="session-end-title" aria-hidden="true">
  <div class="session-end-card">
    <h2 id="session-end-title">Time's up!</h2>
    <p class="session-end-sub">You did awesome — here's your scoreboard!</p>
    <div class="session-end-stats" id="session-end-stats"></div>
    <a href="index.html" class="session-end-home" id="session-end-home">Back to home</a>
  </div>
</div>

<a href="index.html" class="home-btn" id="link-home" aria-label="Back to games">← Home</a>

<div id="mode-buttons">
  <button type="button" class="mode-btn active" data-mode="freeplay">Free Play</button>
  <button type="button" class="mode-btn" data-mode="quiz">Quiz</button>
  <button type="button" class="mode-btn" data-mode="chase">Chase</button>
</div>

<main id="app-main">
  <p class="freeplay-hint" id="mode-hint">Tap a shape!</p>

  <div id="view-freeplay">
    <div id="quiz-top" hidden>
      <p class="quiz-top__title">Which shape do you hear?</p>
      <button type="button" class="quiz-replay-btn" id="quiz-replay-btn" aria-label="Play the color and shape name again">🔊</button>
      <p class="quiz-top__sub">Tap the big speaker if you want to hear it again.</p>
    </div>
    <div class="shape-grid" id="shape-grid" aria-label="Shapes and colors"></div>
  </div>
</main>

<div id="chase-arena" aria-hidden="true"></div>
<div id="thumbs-down" aria-hidden="true">👎</div>

<script>
/**
 * Mix of emoji tiles and inline-SVG polygons (pentagon, hexagon, parallelogram, trapezoid).
 * Pill / chase label fallbacks use `emoji` where SVG is shown in the grid.
 */
function makeShapeSvg(kind, fill) {
  var r;
  var k;
  var t;
  var x;
  var y;
  var d;
  var open =
    '<svg class="shape-tile-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">';
  var close = '</svg>';
  if (kind === 'pentagon') {
    r = 46;
    d = '';
    for (k = 0; k < 5; k++) {
      t = -Math.PI / 2 + (2 * Math.PI * k) / 5;
      x = 50 + r * Math.cos(t);
      y = 50 + r * Math.sin(t);
      d += (k === 0 ? 'M' : 'L') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
    }
    return open + '<path d="' + d + 'Z" fill="' + fill + '" />' + close;
  }
  if (kind === 'hexagon') {
    r = 45;
    d = '';
    for (k = 0; k < 6; k++) {
      t = -Math.PI / 2 + (2 * Math.PI * k) / 6;
      x = 50 + r * Math.cos(t);
      y = 50 + r * Math.sin(t);
      d += (k === 0 ? 'M' : 'L') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
    }
    return open + '<path d="' + d + 'Z" fill="' + fill + '" />' + close;
  }
  if (kind === 'parallelogram') {
    d = 'M 6 78 L 36 22 L 94 22 L 64 78 Z';
    return open + '<path d="' + d + '" fill="' + fill + '" />' + close;
  }
  if (kind === 'trapezoid') {
    d = 'M 6 78 L 30 22 L 70 22 L 94 78 Z';
    return open + '<path d="' + d + '" fill="' + fill + '" />' + close;
  }
  if (kind === 'oval') {
    return open + '<ellipse cx="50" cy="50" rx="46" ry="30" fill="' + fill + '" />' + close;
  }
  return '';
}

function defaultStats() {
  return {
    freeShapes: 0,
    quizCorrect: 0,
    chaseCorrect: 0,
    quizStruggled: [],
    chaseStruggled: [],
    visitedFreeplay: false,
    visitedQuiz: false,
    visitedChase: false
  };
}

function normalizeStats(parsed) {
  const d = defaultStats();
  if (!parsed || typeof parsed !== 'object') return d;
  const freeShapes = typeof parsed.freeShapes === 'number'
    ? parsed.freeShapes
    : (typeof parsed.freeAnimals === 'number' ? parsed.freeAnimals : d.freeShapes);
  return {
    ...d,
    ...parsed,
    freeShapes: freeShapes,
    quizStruggled: Array.isArray(parsed.quizStruggled) ? parsed.quizStruggled : [],
    chaseStruggled: Array.isArray(parsed.chaseStruggled) ? parsed.chaseStruggled : [],
    visitedFreeplay: !!parsed.visitedFreeplay,
    visitedQuiz: !!parsed.visitedQuiz,
    visitedChase: !!parsed.visitedChase
  };
}

let playLimitEndsAt = null;
let sessionEnded = false;
let sessionTickId = null;
let stats = defaultStats();

function shouldTrackStats() {
  return playLimitEndsAt != null && !sessionEnded;
}

function persistStats() {
  if (!shouldTrackStats()) return;
  try {
    sessionStorage.setItem(STATS_KEY, JSON.stringify(stats));
  } catch (_) {}
}

function bumpStat(field) {
  if (!shouldTrackStats()) return;
  stats[field]++;
  if (field === 'freeShapes') stats.visitedFreeplay = true;
  persistStats();
}

function addQuizStruggle(key) {
  if (!shouldTrackStats() || key == null || key === '') return;
  const k = String(key);
  if (!stats.quizStruggled.includes(k)) stats.quizStruggled.push(k);
  persistStats();
}

function addChaseStruggle() {
  if (!shouldTrackStats() || chaseTargetKey == null || chaseTargetKey === '') return;
  const k = String(chaseTargetKey);
  if (!stats.chaseStruggled.includes(k)) stats.chaseStruggled.push(k);
  persistStats();
}

function loadStatsFromStorage() {
  try {
    const raw = sessionStorage.getItem(STATS_KEY);
    stats = raw ? normalizeStats(JSON.parse(raw)) : defaultStats();
  } catch (_) {
    stats = defaultStats();
  }
}

function readPortalPlayDeadline() {
  try {
    const raw = sessionStorage.getItem(PORTAL_TIMER_KEY);
    if (!raw) return null;
    const o = JSON.parse(raw);
    const e = o.endsAt != null ? Number(o.endsAt) : null;
    if (e == null || isNaN(e) || Date.now() >= e) return null;
    return e;
  } catch (_) {
    return null;
  }
}

function clearPlaySessionStorage(alsoClearPortalTimer) {
  try {
    sessionStorage.removeItem(SESSION_KEY);
    sessionStorage.removeItem(STATS_KEY);
    if (alsoClearPortalTimer) {
      sessionStorage.removeItem(PORTAL_TIMER_KEY);
      sessionStorage.removeItem(PLAY_LIMIT_UI_KEY);
    }
  } catch (_) {}
}

function initPlaySession() {
  try {
    const portalDeadline = readPortalPlayDeadline();
    const raw = sessionStorage.getItem(SESSION_KEY);
    let endsAt = null;
    let startedAt = Date.now();

    if (portalDeadline != null) {
      endsAt = portalDeadline;
      if (raw) {
        try {
          const s = JSON.parse(raw);
          if (s.startedAt != null && !isNaN(Number(s.startedAt))) startedAt = Number(s.startedAt);
        } catch (_) {}
      }
      try {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ endsAt, startedAt }));
      } catch (_) {}
    } else if (raw) {
      const s = JSON.parse(raw);
      endsAt = s.endsAt != null ? Number(s.endsAt) : null;
      if (s.startedAt != null && !isNaN(Number(s.startedAt))) startedAt = Number(s.startedAt);
    } else {
      playLimitEndsAt = null;
      stats = defaultStats();
      sessionStorage.removeItem(STATS_KEY);
      return;
    }

    if (endsAt != null && (isNaN(endsAt) || Date.now() >= endsAt)) {
      playLimitEndsAt = endsAt;
      loadStatsFromStorage();
      onSessionTimeUp();
      return;
    }
    playLimitEndsAt = endsAt;
    loadStatsFromStorage();
  } catch (_) {
    playLimitEndsAt = null;
    stats = defaultStats();
  }
}

function formatTimeLeft(ms) {
  const sec = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(sec / 60);
  const r = sec % 60;
  return m + ':' + (r < 10 ? '0' : '') + r;
}

function onSessionTimeUp() {
  if (sessionEnded) return;
  sessionEnded = true;
  try {
    sessionStorage.removeItem(PORTAL_TIMER_KEY);
    sessionStorage.removeItem(PLAY_LIMIT_UI_KEY);
  } catch (_) {}
  if (sessionTickId != null) {
    clearInterval(sessionTickId);
    sessionTickId = null;
  }
  loadStatsFromStorage();
  stopShapesGame();
  document.body.classList.add('session-ended');
  const timerEl = document.getElementById('play-timer');
  timerEl.classList.remove('is-visible');
  timerEl.textContent = '';
  const overlay = document.getElementById('session-end-overlay');
  overlay.setAttribute('aria-hidden', 'false');
  const board = document.getElementById('session-end-stats');
  board.innerHTML = '';

  function addScoreSection(modClass, icon, title, bodyEl) {
    const sec = document.createElement('div');
    sec.className = 'score-section ' + modClass;
    const head = document.createElement('div');
    head.className = 'score-section__head';
    const ic = document.createElement('span');
    ic.className = 'score-section__icon';
    ic.setAttribute('aria-hidden', 'true');
    ic.textContent = icon;
    const ttl = document.createElement('div');
    ttl.className = 'score-section__title';
    ttl.textContent = title;
    head.appendChild(ic);
    head.appendChild(ttl);
    const body = document.createElement('div');
    body.className = 'score-section__body';
    body.appendChild(bodyEl);
    sec.appendChild(head);
    sec.appendChild(body);
    board.appendChild(sec);
  }

  function addMutedSection(modClass, icon, title, message) {
    const sec = document.createElement('div');
    sec.className = 'score-section score-section--muted ' + modClass;
    const head = document.createElement('div');
    head.className = 'score-section__head';
    const ic = document.createElement('span');
    ic.className = 'score-section__icon';
    ic.setAttribute('aria-hidden', 'true');
    ic.textContent = icon;
    const ttl = document.createElement('div');
    ttl.className = 'score-section__title';
    ttl.textContent = title;
    head.appendChild(ic);
    head.appendChild(ttl);
    const body = document.createElement('div');
    body.className = 'score-section__body';
    body.textContent = message;
    sec.appendChild(head);
    sec.appendChild(body);
    board.appendChild(sec);
  }

  function pillsForShapeKeys(arr) {
    const wrap = document.createElement('div');
    wrap.className = 'score-pills';
    arr.forEach(function(key) {
      const pill = document.createElement('span');
      pill.className = 'score-pill';
      pill.textContent = shapeEmojiForKey(key);
      pill.setAttribute('title', key);
      wrap.appendChild(pill);
    });
    return wrap;
  }

  if (!stats.visitedFreeplay) {
    addMutedSection('score-section--free', '🎨', 'Free play', 'This mode was not accessed during this play session.');
  } else if (stats.freeShapes === 0) {
    const line = document.createElement('span');
    line.textContent = 'You opened Free play — next time, tap shapes to hear colors and names! 🔷';
    addScoreSection('score-section--free', '🎨', 'Free play', line);
  } else {
    const fc = stats.freeShapes;
    const line = document.createElement('span');
    line.textContent = 'You explored shapes ' + fc + ' ' + (fc === 1 ? 'time' : 'times') + '! 🔷';
    addScoreSection('score-section--free', '🎨', 'Free play', line);
  }

  if (!stats.visitedQuiz) {
    addMutedSection('score-section--quiz', '🧠', 'Quiz', 'This mode was not accessed during this play session.');
  } else {
    const wrap = document.createDocumentFragment();
    const line = document.createElement('div');
    if (stats.quizCorrect > 0) {
      line.textContent = 'Nice work — ' + stats.quizCorrect + ' quiz ' + (stats.quizCorrect === 1 ? 'round' : 'rounds') + ' solved!';
    } else if (stats.quizStruggled.length > 0) {
      line.textContent = 'You were practicing — keep going next time!';
    } else {
      line.textContent = 'You opened Quiz — match the voice to the shape next time! 🧩';
    }
    wrap.appendChild(line);
    if (stats.quizStruggled.length === 0) {
      if (stats.quizCorrect > 0) {
        const cheer = document.createElement('div');
        cheer.className = 'score-celebrate';
        cheer.textContent = 'Every answer was first try — you are a star! ⭐';
        wrap.appendChild(cheer);
      }
    } else {
      const sub = document.createElement('div');
      sub.style.marginTop = '0.45rem';
      sub.style.fontWeight = '600';
      sub.textContent = stats.quizCorrect > 0
        ? 'These took an extra try (you got them!):'
        : 'These shapes needed another try:';
      wrap.appendChild(sub);
      wrap.appendChild(pillsForShapeKeys(stats.quizStruggled));
    }
    const holder = document.createElement('div');
    holder.appendChild(wrap);
    addScoreSection('score-section--quiz', '🧠', 'Quiz', holder);
  }

  if (!stats.visitedChase) {
    addMutedSection('score-section--chase', '🏃', 'Chase', 'This mode was not accessed during this play session.');
  } else {
    const wrap = document.createDocumentFragment();
    const line = document.createElement('div');
    if (stats.chaseCorrect > 0) {
      line.textContent = 'You caught the target ' + stats.chaseCorrect + ' ' + (stats.chaseCorrect === 1 ? 'time' : 'times') + '!';
    } else if (stats.chaseStruggled.length > 0) {
      line.textContent = 'You were chasing — nice effort!';
    } else {
      line.textContent = 'You opened Chase — tap the moving shape next time! 🎯';
    }
    wrap.appendChild(line);
    if (stats.chaseStruggled.length === 0) {
      if (stats.chaseCorrect > 0) {
        const cheer = document.createElement('div');
        cheer.className = 'score-celebrate';
        cheer.textContent = 'No mix-ups — sharp tapping! 🎯';
        wrap.appendChild(cheer);
      }
    } else {
      const sub = document.createElement('div');
      sub.style.marginTop = '0.45rem';
      sub.style.fontWeight = '600';
      sub.textContent = stats.chaseCorrect > 0
        ? 'These targets needed another tap or two:'
        : 'These targets were tricky to catch:';
      wrap.appendChild(sub);
      wrap.appendChild(pillsForShapeKeys(stats.chaseStruggled));
    }
    const holder = document.createElement('div');
    holder.appendChild(wrap);
    addScoreSection('score-section--chase', '🏃', 'Chase', holder);
  }

  window.speechSynthesis.cancel();
}

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') {
    const p = audioCtx.resume();
    if (p && typeof p.catch === 'function') p.catch(function() {});
  }
  return audioCtx;
}

function playChime() {
  const ctx = getAudioCtx();
  const notes = [523.25, 659.25, 783.99];
  notes.forEach(function(freq, i) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = 0.15;
    gain.gain.setTargetAtTime(0, ctx.currentTime + i * 0.1 + 0.08, 0.02);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.1);
    osc.stop(ctx.currentTime + i * 0.1 + 0.2);
  });
}

function playBuzzer() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = 200;
  gain.gain.value = 0.08;
  gain.gain.setTargetAtTime(0, ctx.currentTime + 0.25, 0.03);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.35);
}

(function setupIosMediaUnlock() {
  let unlocked = false;
  function once() {
    if (unlocked) return;
    unlocked = true;
    document.removeEventListener('touchstart', once, true);
    document.removeEventListener('pointerdown', once, true);
    document.removeEventListener('click', once, true);
    try {
      getAudioCtx();
    } catch (e) { /* ignore */ }
    try {
      if (window.speechSynthesis && window.speechSynthesis.getVoices) window.speechSynthesis.getVoices();
    } catch (e2) { /* ignore */ }
  }
  document.addEventListener('touchstart', once, { passive: true, capture: true });
  document.addEventListener('pointerdown', once, { passive: true, capture: true });
  document.addEventListener('click', once, { capture: true });
})();

function pickEnSpeechVoice() {
  try {
    const list = window.speechSynthesis.getVoices();
    if (!list || !list.length) return null;
    for (let i = 0; i < list.length; i++) {
      const lang = list[i].lang || '';
      if (lang.indexOf('en') === 0) return list[i];
    }
    return list[0];
  } catch (e) {
    return null;
  }
}

function speakShapePrompt(shapeIndex) {
  if (sessionEnded) return;
  const item = SHAPES[shapeIndex];
  if (!item) return;
  const synth = window.speechSynthesis;

  synth.cancel();
  if (synth.paused) synth.resume();
  const u = new SpeechSynthesisUtterance(item.say || item.name);
  u.rate = 0.88;
  const voice = pickEnSpeechVoice();
  if (voice) u.voice = voice;
  synth.speak(u);
}

function getChaseParams() {
  const count = Math.min(3 + Math.floor(chaseDifficulty / 2), 8);
  const speed = 100 + chaseDifficulty * 10;
  const fontSize = Math.max(12, 22 - count * 1.2);
  return { count: Math.min(count, SHAPES.length), speed: speed, fontSize: fontSize };
}

function startChaseRound() {
  if (sessionEnded || mode !== 'chase') return;
  if (chaseAnimId) {
    cancelAnimationFrame(chaseAnimId);
    chaseAnimId = null;
  }
  chasePaused = false;
  thumbsDown.style.display = 'none';
  thumbsDown.setAttribute('aria-hidden', 'true');
  chaseShapes.forEach(function(c) { c.el.remove(); });
  chaseShapes = [];

  const params = getChaseParams();
  const count = params.count;
  const speed = params.speed;
  const fontSize = params.fontSize;

  const indices = SHAPES.map(function(_, i) { return i; })
    .sort(function() { return Math.random() - 0.5; })
    .slice(0, count);
  const targetSlot = Math.floor(Math.random() * indices.length);
  chaseTargetIndex = indices[targetSlot];
  chaseTargetKey = SHAPES[chaseTargetIndex].key;

  indices.forEach(function(shapeIndex, i) {
    const a = SHAPES[shapeIndex];
    const el = document.createElement('button');
    el.type = 'button';
    el.className = 'chase-shape' + (a.svgMarkup ? ' chase-shape--svg' : '');
    if (a.svgMarkup) {
      el.innerHTML = a.svgMarkup;
    } else {
      el.textContent = a.emoji;
    }
    el.setAttribute('aria-label', a.name);
    el.style.fontSize = fontSize + 'vmin';
    chaseArena.appendChild(el);
    chaseShapes.push({
      el: el,
      key: a.key,
      shapeIndex: shapeIndex,
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      w: 0,
      h: 0
    });
  });

  requestAnimationFrame(function() {
    if (mode !== 'chase') return;
    chaseShapes.forEach(function(c) {
      c.w = c.el.offsetWidth;
      c.h = c.el.offsetHeight;
      c.x = Math.random() * (window.innerWidth - c.w);
      c.y = Math.random() * (window.innerHeight - c.h);
      const angle = Math.random() * 2 * Math.PI;
      c.vx = Math.cos(angle) * speed;
      c.vy = Math.sin(angle) * speed;
      c.el.style.left = c.x + 'px';
      c.el.style.top = c.y + 'px';
    });
    lastFrameTime = 0;
    chaseAnimId = requestAnimationFrame(animateChase);
  });

  speakShapePrompt(chaseTargetIndex);
  clearInterval(chaseRepeatId);
  chaseRepeatId = setInterval(function() {
    if (mode !== 'chase' || chasePaused || sessionEnded) return;
    speakShapePrompt(chaseTargetIndex);
  }, 5000);
}

function animateChase(timestamp) {
  if (mode !== 'chase' || chaseShapes.length === 0) {
    chaseAnimId = null;
    return;
  }

  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
  lastFrameTime = timestamp;

  if (!chasePaused) {
    const W = window.innerWidth;
    const H = window.innerHeight;
    chaseShapes.forEach(function(c) {
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      if (c.x < 0) { c.x = 0; c.vx = Math.abs(c.vx); }
      if (c.y < 0) { c.y = 0; c.vy = Math.abs(c.vy); }
      if (c.x + c.w > W) { c.x = W - c.w; c.vx = -Math.abs(c.vx); }
      if (c.y + c.h > H) { c.y = H - c.h; c.vy = -Math.abs(c.vy); }
      c.el.style.left = c.x + 'px';
      c.el.style.top = c.y + 'px';
    });

    for (let i = 0; i < chaseShapes.length; i++) {
      for (let j = i + 1; j < chaseShapes.length; j++) {
        const a = chaseShapes[i];
        const b = chaseShapes[j];
        const overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
        const overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
        if (overlapX > 0 && overlapY > 0) {
          if (overlapX < overlapY) {
            const half = overlapX / 2;
            if (a.x < b.x) { a.x -= half; b.x += half; }
            else { a.x += half; b.x -= half; }
            const tmp = a.vx; a.vx = b.vx; b.vx = tmp;
          } else {
            const half = overlapY / 2;
            if (a.y < b.y) { a.y -= half; b.y += half; }
            else { a.y += half; b.y -= half; }
            const tmp = a.vy; a.vy = b.vy; b.vy = tmp;
          }
          a.el.style.left = a.x + 'px';
          a.el.style.top = a.y + 'px';
          b.el.style.left = b.x + 'px';
          b.el.style.top = b.y + 'px';
        }
      }
    }
  }

  if (mode === 'chase' && chaseShapes.length > 0) {
    chaseAnimId = requestAnimationFrame(animateChase);
  } else {
    chaseAnimId = null;
  }
}

function onChasePointer(e) {
  if (sessionEnded) return;
  if (chasePaused) return;

  const x = e.clientX;
  const y = e.clientY;
  const margin = 30;

  const hits = chaseShapes.filter(function(c) {
    return x >= c.x - margin && x <= c.x + c.w + margin &&
      y >= c.y - margin && y <= c.y + c.h + margin;
  });

  if (hits.length === 0) return;

  if (hits.some(function(c) { return c.key === chaseTargetKey; })) {
    bumpStat('chaseCorrect');
    chasePaused = true;
    chaseDifficulty = Math.min(chaseDifficulty + 1, 15);
    spawnConfetti();
    showCelebrationEmojis();
    playChime();
    clearTimeout(delayedChaseTimer);
    delayedChaseTimer = setTimeout(function() {
      delayedChaseTimer = null;
      if (mode !== 'chase') return;
      startChaseRound();
    }, 2000);
  } else {
    addChaseStruggle();
    chaseDifficulty = Math.max(chaseDifficulty - 1, 0);
    showThumbsDown();
    playBuzzer();
  }
}

chaseArena.addEventListener('click', onChasePointer);

function stopChase() {
  if (chaseAnimId) {
    cancelAnimationFrame(chaseAnimId);
    chaseAnimId = null;
  }
  clearInterval(chaseRepeatId);
  chaseRepeatId = null;
  chaseShapes.forEach(function(c) { c.el.remove(); });
  chaseShapes = [];
}

function stopShapesGame() {
  window.speechSynthesis.cancel();
  clearTimeout(delayedQuizTimer);
  delayedQuizTimer = null;
  clearTimeout(delayedChaseTimer);
  delayedChaseTimer = null;
  clearTimeout(thumbsDownTimer);
  thumbsDownTimer = null;
  stopChase();
}

function onGridTap(shapeIndex) {
  if (sessionEnded) return;

  const tileEl = shapeTileEls[shapeIndex];

  if (mode === 'freeplay') {
    bumpStat('freeShapes');
    tileEl.classList.remove('pop');
    void tileEl.offsetWidth;
    tileEl.classList.add('pop');
    speakShapePrompt(shapeIndex);
    return;
  }

  if (mode === 'quiz') {
    if (quizLocked) return;
    if (shapeIndex === quizTargetIndex) {
      bumpStat('quizCorrect');
      quizLocked = true;
      tileEl.classList.remove('pop');
      void tileEl.offsetWidth;
      tileEl.classList.add('pop');
      spawnConfetti();
      showCelebrationEmojis();
      playChime();
      clearTimeout(delayedQuizTimer);
      delayedQuizTimer = setTimeout(function() {
        delayedQuizTimer = null;
        if (mode !== 'quiz') return;
        startQuizRound();
      }, 2000);
    } else {
      addQuizStruggle(SHAPES[quizTargetIndex].key);
      showThumbsDown();
      playBuzzer();
    }
  }
}

function buildShapeGrid() {
  shapeTileEls = [];
  SHAPES.forEach(function(shape, shapeIndex) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'shape-tile';
    btn.setAttribute('aria-label', shape.name);

    const em = document.createElement('span');
    em.className = 'shape-tile__emoji';
    em.setAttribute('aria-hidden', 'true');
    if (shape.svgMarkup) {
      em.innerHTML = shape.svgMarkup;
    } else {
      em.textContent = shape.emoji;
    }

    const nm = document.createElement('span');
    nm.className = 'shape-tile__name';
    nm.textContent = shape.name;

    btn.appendChild(em);
    btn.appendChild(nm);
    btn.addEventListener('click', function() {
      onGridTap(shapeIndex);
    });
    shapeGrid.appendChild(btn);
    shapeTileEls.push(btn);
  });
}

function setMode(newMode) {
  if (sessionEnded) return;
  clearTimeout(delayedQuizTimer);
  delayedQuizTimer = null;
  clearTimeout(delayedChaseTimer);
  delayedChaseTimer = null;
  if (mode === 'chase') stopChase();

  mode = newMode;
  modeBtns.forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  document.body.classList.toggle('chase-active', mode === 'chase');

  const inChase = mode === 'chase';
  viewFreeplay.hidden = inChase;
  appMain.hidden = inChase;
  chaseArena.style.display = inChase ? 'block' : 'none';
  chaseArena.setAttribute('aria-hidden', inChase ? 'false' : 'true');

  window.speechSynthesis.cancel();
  quizLocked = false;
  thumbsDown.style.display = 'none';
  thumbsDown.setAttribute('aria-hidden', 'true');

  shapeGrid.classList.toggle('shape-grid--quiz', mode === 'quiz');
  viewFreeplay.classList.toggle('view-freeplay--quiz', mode === 'quiz');
  appMain.classList.toggle('app-main--quiz', mode === 'quiz');
  quizTop.hidden = mode !== 'quiz';

  if (mode === 'freeplay') {
    modeHint.hidden = false;
    modeHint.textContent = 'Tap a shape!';
  } else if (mode === 'quiz') {
    modeHint.hidden = true;
    startQuizRound();
  } else {
    modeHint.hidden = true;
    chaseDifficulty = 0;
    startChaseRound();
  }

  if (shouldTrackStats()) {
    if (mode === 'freeplay') stats.visitedFreeplay = true;
    else if (mode === 'quiz') stats.visitedQuiz = true;
    else if (mode === 'chase') stats.visitedChase = true;
    persistStats();
  }
}

modeBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    setMode(btn.dataset.mode);
    btn.blur();
  });
});

quizReplayBtn.addEventListener('click', function() {
  replayQuizSound();
  quizReplayBtn.blur();
});

buildShapeGrid();
initPlaySession();
startSessionTimerIfNeeded();
setMode('freeplay');

document.getElementById('link-home').addEventListener('click', function() {
  stopShapesGame();
  clearPlaySessionStorage(false);
});

document.getElementById('session-end-home').addEventListener('click', function() {
  clearPlaySessionStorage(true);
});

window.addEventListener('pagehide', function() {
  stopShapesGame();
});

window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    stopShapesGame();
    setMode('freeplay');
  }
});
</script>
</body>

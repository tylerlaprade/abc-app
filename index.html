<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aria's Playroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/index.css">
</head>
<body>
<main aria-label="Aria's Playroom">
  <header class="portal-header">
    <h1 class="portal-title">Aria's Playroom</h1>
    <p class="portal-sub">Pick a game to play!</p>
  </header>

  <section class="parent-panel" aria-label="Time limit">
    <div class="parent-panel__row">
      <label class="parent-panel__label" for="play-limit">
        <span class="parent-panel__time-icon" aria-hidden="true">⏱️</span>
        Time limit
      </label>
      <select id="play-limit" name="play-limit">
        <option value="unlimited" selected>No limit</option>
        <option value="5">5 minutes</option>
        <option value="10">10 minutes</option>
        <option value="15">15 minutes</option>
        <option value="custom">Custom…</option>
      </select>
      <span class="parent-panel__custom" id="custom-minutes-wrap" hidden>
        <input type="number" id="custom-minutes" name="custom-minutes" min="1" max="180" value="15" inputmode="numeric" aria-label="Custom minutes">
        <span class="parent-panel__custom-suffix">min</span>
      </span>
    </div>
  </section>

  <div class="game-grid"></div>
</main>
<script src="shared/stats.js"></script>
<script src="shared/portal-storage.js"></script>
<script src="data/activities.js"></script>
<script src="scripts/index-page.js"></script>
</body>
</html>

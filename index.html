<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aria's Playroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    width: 100%;
    overflow: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(1rem, 4vw, 2rem);
    font-family: "Fredoka", system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    background: linear-gradient(165deg, #7c4dff 0%, #ff6ec7 45%, #ffd54f 100%);
  }

  /* Full width up to 1080px, centered in the viewport (stretch + max-width left the block visually start-aligned on wide screens). */
  main {
    width: 100%;
    max-width: min(1080px, 100%);
    margin-inline: auto;
    align-self: center;
  }

  .portal-header {
    text-align: center;
    margin-bottom: clamp(1.25rem, 5vw, 2.5rem);
  }

  .portal-title {
    font-size: clamp(2rem, 8vw, 3.25rem);
    font-weight: 700;
    color: #fff;
    text-shadow:
      0 3px 0 #5e35b1,
      0 6px 0 rgba(0, 0, 0, 0.12);
    letter-spacing: 0.02em;
    line-height: 1.15;
  }

  .portal-sub {
    margin-top: 0.5rem;
    font-size: clamp(1rem, 3.5vw, 1.25rem);
    font-weight: 500;
    color: rgba(255, 255, 255, 0.92);
  }

  .game-grid {
    --game-grid-gap: clamp(0.65rem, 2vw, 1.15rem);
    container-type: inline-size;
    container-name: portal-game-grid;
    display: grid;
    /* At most 2 columns when wide: min track is max(15rem, half row). Narrow phones stay 1 column. */
    grid-template-columns: repeat(
      auto-fit,
      minmax(
        max(15rem, min(100%, calc((100% - var(--game-grid-gap)) / 2))),
        1fr
      )
    );
    align-items: stretch;
    justify-items: stretch;
    gap: var(--game-grid-gap);
    width: 100%;
    max-width: min(1080px, 100%);
    margin-inline: auto;
    padding-bottom: 6px;
  }

  /* Third tile sits on its own row when the grid is 2 columns wide (not three in one line). */
  .game-grid .game-tile:nth-child(3) {
    grid-column: 1 / -1;
  }

  /* Narrow grid (usually one column): cap card width so tiles are not full-bleed; wider grid fills each column. */
  @container portal-game-grid (max-width: 31.5rem) {
    .game-grid .game-tile {
      width: min(100%, 22.5rem);
      max-width: 22.5rem;
      justify-self: center;
    }
  }

  @container portal-game-grid (min-width: 31.5rem) {
    .game-grid .game-tile:nth-child(3) {
      justify-self: center;
      width: min(100%, calc((100% - var(--game-grid-gap)) / 2));
    }
  }

  .game-tile {
    container-type: inline-size;
    width: 100%;
    min-width: 0;
    max-width: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 0.5rem;
    padding: clamp(0.85rem, 2.8vw, 1.25rem);
    border-radius: 22px;
    text-decoration: none;
    color: inherit;
    background: linear-gradient(145deg, #fff9c4 0%, #ffecb3 40%, #ffab91 100%);
    border: 5px solid #fff;
    box-shadow:
      0 8px 0 #e65100,
      0 14px 28px rgba(0, 0, 0, 0.2);
    transform: translateY(0);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }

  .game-tile:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow:
      0 12px 0 #e65100,
      0 18px 32px rgba(0, 0, 0, 0.22);
  }

  .game-tile:active {
    transform: translateY(4px) scale(0.98);
    box-shadow:
      0 4px 0 #e65100,
      0 8px 16px rgba(0, 0, 0, 0.18);
  }

  /* Art grows to fill space above titles (equal tile heights); emoji scale with tile width */
  .game-tile__art {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1 1 0;
    min-height: clamp(4.25rem, 24vw, 6.25rem);
    width: 100%;
    box-sizing: border-box;
    font-size: clamp(2rem, 11vw, 3.35rem);
    line-height: 1;
    overflow: hidden;
    filter: drop-shadow(0 3px 0 rgba(230, 81, 0, 0.32));
    animation: tile-wiggle 2.5s ease-in-out infinite;
  }

  @supports (font-size: 1cqi) {
    .game-tile__art {
      min-height: clamp(4.25rem, 42cqi, 7.5rem);
      font-size: clamp(2rem, 26cqi, 3.5rem);
    }
  }

  .game-tile__art--letters {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-wrap: nowrap;
    gap: 0.08em;
    font-family: "Fredoka", system-ui, sans-serif;
    font-weight: 800;
    font-size: clamp(1.75rem, 10vw, 3rem);
    animation: tile-wiggle-letters 2.5s ease-in-out infinite;
  }

  @supports (font-size: 1cqi) {
    .game-tile__art--letters {
      font-size: clamp(1.75rem, 22cqi, 3.1rem);
    }
  }

  @keyframes tile-wiggle-letters {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(2deg) scale(1.02); }
  }

  .game-tile__art--letters .game-tile__art__nums {
    display: inline-flex;
    align-items: center;
    gap: 0.04em;
    margin: 0 0.02em;
    line-height: 1;
  }

  .game-tile__art--letters .game-tile__art__n {
    display: inline-block;
    line-height: 1;
    text-shadow:
      0 2px 0 rgba(0, 0, 0, 0.12),
      0 1px 0 rgba(255, 255, 255, 0.35);
  }

  .game-tile__art__n--1 {
    color: #e53935;
  }

  .game-tile__art__n--2 {
    color: #f9a825;
  }

  .game-tile__art__n--3 {
    color: #1e88e5;
  }

  @keyframes tile-wiggle {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(2deg) scale(1.03); }
  }

  @media (prefers-reduced-motion: reduce) {
    .game-tile__art,
    .game-tile__art--letters { animation: none; }
    .game-tile { transition: none; }
    .game-tile:hover { transform: none; }
  }

  .game-tile__label {
    margin-top: auto;
    display: block;
    width: 90%;
    max-width: 90%;
    margin-inline: auto;
    box-sizing: border-box;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: 0.01em;
    color: #bf360c;
    text-align: center;
    text-wrap: balance;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
    font-size: clamp(0.92rem, 3.8vw, 1.45rem);
  }

  .game-tile__hint {
    display: block;
    width: 90%;
    max-width: 90%;
    margin-inline: auto;
    box-sizing: border-box;
    font-size: clamp(0.8rem, 3.1vw, 1.05rem);
    font-weight: 600;
    line-height: 1.35;
    text-align: center;
    text-wrap: balance;
    color: #e65100;
    opacity: 0.95;
  }

  @supports (font-size: 1cqi) {
    .game-tile__label {
      font-size: clamp(0.92rem, 8.5cqi, 1.45rem);
    }

    .game-tile__hint {
      font-size: clamp(0.8rem, 6.8cqi, 1.05rem);
    }
  }

  .game-tile--animals {
    background: linear-gradient(145deg, #e8f5e9 0%, #a5d6a7 42%, #4dd0e1 100%);
    box-shadow:
      0 8px 0 #2e7d32,
      0 14px 28px rgba(0, 0, 0, 0.2);
  }

  .game-tile--animals .game-tile__art {
    filter: drop-shadow(0 4px 0 rgba(46, 125, 50, 0.4));
  }

  .game-tile--animals .game-tile__label {
    color: #1b5e20;
  }

  .game-tile--animals .game-tile__hint {
    color: #2e7d32;
    opacity: 0.95;
  }

  .game-tile--animals:hover {
    box-shadow:
      0 12px 0 #2e7d32,
      0 18px 32px rgba(0, 0, 0, 0.22);
  }

  .game-tile--animals:active {
    box-shadow:
      0 4px 0 #2e7d32,
      0 8px 16px rgba(0, 0, 0, 0.18);
  }

  .game-tile--shapes {
    background: linear-gradient(145deg, #ede7f6 0%, #ce93d8 42%, #7e57c2 100%);
    box-shadow:
      0 8px 0 #5e35b1,
      0 14px 28px rgba(0, 0, 0, 0.2);
  }

  .game-tile--shapes .game-tile__art {
    filter: drop-shadow(0 4px 0 rgba(94, 53, 177, 0.4));
  }

  .game-tile__art--shapes-icons {
    flex-wrap: wrap;
    align-content: center;
    column-gap: clamp(0.45rem, 5.5vw, 1rem);
    row-gap: clamp(0.35rem, 3vw, 0.65rem);
  }

  .game-tile__art--shapes-icons .game-tile__art__shape {
    display: inline-flex;
    flex-shrink: 0;
    line-height: 1;
  }

  @supports (font-size: 1cqi) {
    .game-tile__art--shapes-icons {
      column-gap: clamp(0.45rem, 5.5cqi, 1rem);
      row-gap: clamp(0.35rem, 3.5cqi, 0.65rem);
    }
  }

  .game-tile--shapes .game-tile__label {
    color: #4a148c;
  }

  .game-tile--shapes .game-tile__hint {
    color: #6a1b9a;
    opacity: 0.95;
  }

  .game-tile--shapes:hover {
    box-shadow:
      0 12px 0 #5e35b1,
      0 18px 32px rgba(0, 0, 0, 0.22);
  }

  .game-tile--shapes:active {
    box-shadow:
      0 4px 0 #5e35b1,
      0 8px 16px rgba(0, 0, 0, 0.18);
  }

  .parent-panel {
    width: 100%;
    max-width: min(1080px, 100%);
    margin-bottom: clamp(1rem, 4vw, 1.5rem);
    padding: clamp(0.65rem, 2.5vw, 0.85rem) clamp(0.85rem, 2.5vw, 1rem);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.22);
    border: 2px solid rgba(255, 255, 255, 0.45);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
  }

  .parent-panel__row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.5rem 0.65rem;
  }

  .parent-panel__label {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: clamp(0.9rem, 3vw, 1rem);
    font-weight: 600;
    color: #fff;
  }

  .parent-panel__time-icon {
    font-size: 1.2rem;
    line-height: 1;
    filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.15));
  }

  .parent-panel select {
    font-family: inherit;
    font-size: clamp(0.9rem, 3vw, 1rem);
    font-weight: 600;
    padding: 0.45rem 0.75rem;
    border-radius: 10px;
    border: 2px solid rgba(255, 255, 255, 0.6);
    background: #fff;
    color: #5e35b1;
    cursor: pointer;
    min-width: 10.5rem;
  }

  .parent-panel__custom {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }

  .parent-panel__custom[hidden] {
    display: none !important;
  }

  .parent-panel__custom input {
    font-family: inherit;
    font-size: clamp(0.9rem, 3vw, 1rem);
    font-weight: 600;
    width: 4.25rem;
    padding: 0.4rem 0.5rem;
    border-radius: 10px;
    border: 2px solid rgba(255, 255, 255, 0.6);
    background: #fff;
    color: #5e35b1;
    text-align: center;
  }

  .parent-panel__custom-suffix {
    font-size: clamp(0.85rem, 2.8vw, 0.95rem);
    font-weight: 600;
    color: #fff;
  }
</style>
</head>
<body>
<main aria-label="Aria's Playroom">
  <header class="portal-header">
    <h1 class="portal-title">Aria's Playroom</h1>
    <p class="portal-sub">Pick a game to play!</p>
  </header>

  <section class="parent-panel" aria-label="Time limit">
    <div class="parent-panel__row">
      <label class="parent-panel__label" for="play-limit">
        <span class="parent-panel__time-icon" aria-hidden="true">⏱️</span>
        Time limit
      </label>
      <select id="play-limit" name="play-limit">
        <option value="unlimited" selected>No limit</option>
        <option value="5">5 minutes</option>
        <option value="10">10 minutes</option>
        <option value="15">15 minutes</option>
        <option value="custom">Custom…</option>
      </select>
      <span class="parent-panel__custom" id="custom-minutes-wrap" hidden>
        <input type="number" id="custom-minutes" name="custom-minutes" min="1" max="180" value="15" inputmode="numeric" aria-label="Custom minutes">
        <span class="parent-panel__custom-suffix">min</span>
      </span>
    </div>
  </section>

  <div class="game-grid">
    <a class="game-tile" href="alphabet.html" id="tile-alphabets">
      <span class="game-tile__art game-tile__art--letters" aria-hidden="true">
        <span class="game-tile__art__emoji">🔤</span>
        <span class="game-tile__art__nums">
          <span class="game-tile__art__n game-tile__art__n--1">1</span>
          <span class="game-tile__art__n game-tile__art__n--2">2</span>
          <span class="game-tile__art__n game-tile__art__n--3">3</span>
        </span>
        <span class="game-tile__art__emoji">✨</span>
      </span>
      <span class="game-tile__label">Learn Alphabets and Numbers</span>
      <span class="game-tile__hint">Letters and numbers!</span>
    </a>
    <a class="game-tile game-tile--animals" href="animals.html" id="tile-animals">
      <span class="game-tile__art" aria-hidden="true">🦁🔊🐘</span>
      <span class="game-tile__label">Learn Animals and Sounds</span>
      <span class="game-tile__hint">Roars, chirps and more!</span>
    </a>
    <a class="game-tile game-tile--shapes" href="shapes.html" id="tile-shapes">
      <span class="game-tile__art game-tile__art--shapes-icons" aria-hidden="true">
        <span class="game-tile__art__shape">🔴</span>
        <span class="game-tile__art__shape">🟦</span>
        <span class="game-tile__art__shape">⭐</span>
      </span>
      <span class="game-tile__label">Learn Shapes and Colors</span>
      <span class="game-tile__hint">Circles, squares, and more!</span>
    </a>
  </div>
</main>
<script>
(function() {
  var ALPHABET_SESSION_KEY = 'ariaAlphabetSession';
  var ALPHABET_STATS_KEY = 'ariaAlphabetStats';
  var ANIMALS_SESSION_KEY = 'ariaAnimalsSession';
  var ANIMALS_STATS_KEY = 'ariaAnimalsStats';
  var SHAPES_SESSION_KEY = 'ariaShapesSession';
  var SHAPES_STATS_KEY = 'ariaShapesStats';
  var PORTAL_TIMER_KEY = 'ariaPortalPlayTimer';
  var PLAY_LIMIT_UI_KEY = 'ariaPortalPlayLimitUi';

  function defaultAlphabetStats() {
    return {
      freeChars: 0,
      quizCorrect: 0,
      chaseCorrect: 0,
      quizStruggled: [],
      chaseStruggled: [],
      visitedFreeplay: false,
      visitedQuiz: false,
      visitedChase: false
    };
  }

  function defaultAnimalsStats() {
    return {
      freeAnimals: 0,
      quizCorrect: 0,
      chaseCorrect: 0,
      quizStruggled: [],
      chaseStruggled: [],
      visitedFreeplay: false,
      visitedQuiz: false,
      visitedChase: false
    };
  }

  function defaultShapesStats() {
    return {
      freeShapes: 0,
      quizCorrect: 0,
      chaseCorrect: 0,
      quizStruggled: [],
      chaseStruggled: [],
      visitedFreeplay: false,
      visitedQuiz: false,
      visitedChase: false
    };
  }

  var playLimit = document.getElementById('play-limit');
  var customWrap = document.getElementById('custom-minutes-wrap');
  var customMinutes = document.getElementById('custom-minutes');

  function syncCustomVisibility() {
    customWrap.hidden = playLimit.value !== 'custom';
  }

  function readActivePortalPayload() {
    try {
      var raw = sessionStorage.getItem(PORTAL_TIMER_KEY);
      if (!raw) return null;
      var o = JSON.parse(raw);
      var e = o.endsAt != null ? Number(o.endsAt) : null;
      if (e == null || isNaN(e) || Date.now() >= e) return null;
      return o;
    } catch (err) {
      return null;
    }
  }

  function persistPlayLimitUi() {
    try {
      sessionStorage.setItem(PLAY_LIMIT_UI_KEY, JSON.stringify({
        selectValue: playLimit.value,
        customMinutes: customMinutes.value
      }));
    } catch (err) {}
  }

  /** Home page reload resets the <select> to default; sync from active portal or last choice so resolveMinutes() matches the running timer. */
  function restorePlayLimitUiFromStorage() {
    try {
      var portal = readActivePortalPayload();
      if (portal && portal.limitMinutes != null) {
        var lm = Number(portal.limitMinutes);
        if (lm === 5 || lm === 10 || lm === 15) {
          playLimit.value = String(lm);
        } else {
          playLimit.value = 'custom';
          customMinutes.value = String(lm);
        }
        syncCustomVisibility();
        persistPlayLimitUi();
        return;
      }
      var raw = sessionStorage.getItem(PLAY_LIMIT_UI_KEY);
      if (!raw) return;
      var u = JSON.parse(raw);
      if (u.selectValue) playLimit.value = u.selectValue;
      if (u.customMinutes != null) customMinutes.value = u.customMinutes;
      syncCustomVisibility();
    } catch (err) {}
  }

  restorePlayLimitUiFromStorage();

  playLimit.addEventListener('change', function() {
    syncCustomVisibility();
    persistPlayLimitUi();
  });
  customMinutes.addEventListener('input', persistPlayLimitUi);
  customMinutes.addEventListener('change', persistPlayLimitUi);
  syncCustomVisibility();

  function resolveMinutes() {
    var sel = playLimit.value;
    if (sel === 'unlimited') return null;
    if (sel === 'custom') {
      var n = parseInt(customMinutes.value, 10);
      if (isNaN(n) || n < 1) n = 1;
      if (n > 180) n = 180;
      return n;
    }
    var preset = parseInt(sel, 10);
    return !isNaN(preset) && preset > 0 ? preset : null;
  }

  /** One shared deadline across alphabet, animals, and shapes while the same limit is selected. */
  function resolveEndsAtForPortalNavigation(mins) {
    if (mins == null) {
      try {
        sessionStorage.removeItem(PORTAL_TIMER_KEY);
      } catch (err) {}
      try {
        sessionStorage.removeItem(PLAY_LIMIT_UI_KEY);
      } catch (err2) {}
      return { endsAt: null, startedAt: Date.now() };
    }
    try {
      var raw = sessionStorage.getItem(PORTAL_TIMER_KEY);
      if (raw) {
        var o = JSON.parse(raw);
        var prevMins = o.limitMinutes != null ? Number(o.limitMinutes) : NaN;
        var e = o.endsAt != null ? Number(o.endsAt) : null;
        if (prevMins === mins && e != null && !isNaN(e) && Date.now() < e) {
          return {
            endsAt: e,
            startedAt: o.startedAt != null ? Number(o.startedAt) : Date.now()
          };
        }
      }
    } catch (err) {}
    var end = Date.now() + mins * 60 * 1000;
    try {
      sessionStorage.setItem(PORTAL_TIMER_KEY, JSON.stringify({
        endsAt: end,
        startedAt: Date.now(),
        limitMinutes: mins
      }));
    } catch (err2) {}
    return { endsAt: end, startedAt: Date.now() };
  }

  document.getElementById('tile-alphabets').addEventListener('click', function(e) {
    e.preventDefault();
    persistPlayLimitUi();
    var mins = resolveMinutes();
    var t = resolveEndsAtForPortalNavigation(mins);
    try {
      sessionStorage.setItem(ALPHABET_SESSION_KEY, JSON.stringify({
        endsAt: t.endsAt,
        startedAt: t.startedAt
      }));
      sessionStorage.setItem(ALPHABET_STATS_KEY, JSON.stringify(defaultAlphabetStats()));
    } catch (err) {}
    window.location.href = 'alphabet.html';
  });

  document.getElementById('tile-animals').addEventListener('click', function(e) {
    e.preventDefault();
    persistPlayLimitUi();
    var mins = resolveMinutes();
    var t = resolveEndsAtForPortalNavigation(mins);
    try {
      sessionStorage.setItem(ANIMALS_SESSION_KEY, JSON.stringify({
        endsAt: t.endsAt,
        startedAt: t.startedAt
      }));
      sessionStorage.setItem(ANIMALS_STATS_KEY, JSON.stringify(defaultAnimalsStats()));
    } catch (err) {}
    window.location.href = 'animals.html';
  });

  document.getElementById('tile-shapes').addEventListener('click', function(e) {
    e.preventDefault();
    persistPlayLimitUi();
    var mins = resolveMinutes();
    var t = resolveEndsAtForPortalNavigation(mins);
    try {
      sessionStorage.setItem(SHAPES_SESSION_KEY, JSON.stringify({
        endsAt: t.endsAt,
        startedAt: t.startedAt
      }));
      sessionStorage.setItem(SHAPES_STATS_KEY, JSON.stringify(defaultShapesStats()));
    } catch (err) {}
    window.location.href = 'shapes.html';
  });
})();
</script>
</body>
</html>

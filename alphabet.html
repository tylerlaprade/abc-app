<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Learn Alphabets — Aria's Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  .home-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 150;
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 999px;
    border: 3px solid #7c4dff;
    background: #fff;
    color: #5e35b1;
    cursor: pointer;
    box-shadow: 0 3px 0 #5e35b1;
    -webkit-tap-highlight-color: transparent;
    text-decoration: none;
  }

  .home-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #5e35b1;
  }

  #hint {
    font-size: 4vw;
    color: #aaa;
    transition: opacity 0.5s;
  }

  #letter {
    font-size: 50vw;
    font-weight: bold;
    line-height: 1;
    display: none;
  }

  #letter.pop {
    animation: pop 0.2s ease-out;
  }

  #letter.fade-out {
    animation: fade-out 0.5s ease-out forwards;
  }

  @keyframes pop {
    from { transform: scale(0.5); }
    to   { transform: scale(1.0); }
  }

  @keyframes fade-out {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  #mode-buttons {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    gap: 6px;
  }
  .mode-btn {
    background: #eee;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 14px;
    font-family: system-ui, -apple-system, sans-serif;
    color: #666;
    cursor: pointer;
  }
  .mode-btn:hover { background: #ddd; }
  .mode-btn.active {
    background: #1e88e5;
    border-color: #1565c0;
    color: #fff;
  }
  .mode-btn.active { pointer-events: none; }

  #thumbs-down {
    position: fixed;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15vw;
    display: none;
    z-index: 50;
    animation: shake 0.4s ease-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(-50%) rotate(0deg); }
    20% { transform: translateX(-50%) rotate(-10deg); }
    40% { transform: translateX(-50%) rotate(10deg); }
    60% { transform: translateX(-50%) rotate(-5deg); }
    80% { transform: translateX(-50%) rotate(5deg); }
  }

  .celebration-emoji {
    position: fixed;
    z-index: 55;
    font-size: 12vw;
    pointer-events: none;
    animation: emoji-pop 1.5s ease-out forwards;
  }

  @keyframes emoji-pop {
    0%   { transform: scale(0) rotate(-20deg); opacity: 1; }
    30%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
    50%  { transform: scale(1) rotate(0deg); opacity: 1; }
    100% { transform: scale(1.3) rotate(10deg); opacity: 0; }
  }

  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 60;
    animation: confetti-burst var(--duration) ease-out forwards;
  }

  @keyframes confetti-burst {
    0% {
      transform: translate(0, 0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
      opacity: 0;
    }
  }

  #display-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #touch-grid {
    display: none;
  }

  @media (pointer: coarse) {
    body {
      flex-direction: column;
    }

    #display-area {
      flex: 0 0 55%;
    }

    #letter {
      font-size: 35vw;
    }

    #touch-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 4px;
      padding: 8px;
      width: 100%;
    }

    .grid-btn {
      border: none;
      border-radius: 8px;
      background: #f0f0f0;
      font-size: 5vw;
      font-weight: bold;
      font-family: system-ui, -apple-system, sans-serif;
      color: #333;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .grid-btn:active {
      background: #ddd;
      transform: scale(0.95);
    }

    #thumbs-down {
      bottom: auto;
      top: 35%;
      font-size: 10vw;
    }

    .celebration-emoji {
      font-size: 8vw;
    }
  }

  #chase-arena {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
  }

  .chase-char {
    position: absolute;
    font-weight: bold;
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .chase-char:active {
    transform: scale(0.9);
  }

  #play-timer {
    display: none;
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 140;
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(94, 53, 177, 0.92);
    color: #fff;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    pointer-events: none;
  }

  #play-timer.is-visible {
    display: block;
  }

  body.session-ended {
    pointer-events: none;
  }

  body.session-ended #session-end-overlay,
  body.session-ended #session-end-overlay * {
    pointer-events: auto;
  }

  #session-end-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(0, 0, 0, 0.45);
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  body.session-ended #session-end-overlay {
    display: flex;
  }

  .session-end-card {
    max-width: 24rem;
    width: 100%;
    background: linear-gradient(160deg, #fff9e6 0%, #ffe0f0 40%, #e3f2fd 100%);
    border-radius: 24px;
    padding: clamp(1.35rem, 4vw, 1.85rem);
    font-family: "Fredoka", system-ui, sans-serif;
    box-shadow:
      0 4px 0 #ff6ec7,
      0 16px 48px rgba(0, 0, 0, 0.22);
    border: 4px solid #fff;
    position: relative;
    overflow: hidden;
  }

  .session-end-card::before {
    content: "⭐";
    position: absolute;
    top: 0.5rem;
    right: 0.75rem;
    font-size: 1.75rem;
    opacity: 0.9;
    pointer-events: none;
  }

  .session-end-card::after {
    content: "✨";
    position: absolute;
    bottom: 3.5rem;
    left: 0.65rem;
    font-size: 1.35rem;
    opacity: 0.85;
    pointer-events: none;
  }

  .session-end-card h2 {
    font-size: clamp(1.5rem, 5.5vw, 1.85rem);
    color: #6a1b9a;
    margin-bottom: 0.25rem;
    text-align: center;
    text-shadow: 0 2px 0 rgba(255, 255, 255, 0.8);
  }

  .session-end-card .session-end-sub {
    font-size: clamp(0.95rem, 3.2vw, 1.05rem);
    font-weight: 600;
    color: #ad1457;
    text-align: center;
    margin-bottom: 1.1rem;
  }

  .session-end-stats {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin: 0 0 1.2rem;
  }

  .score-section {
    border-radius: 16px;
    padding: 0.75rem 0.85rem;
    border: 3px solid rgba(255, 255, 255, 0.95);
    box-shadow: 0 3px 0 rgba(0, 0, 0, 0.08);
  }

  .score-section--free {
    background: linear-gradient(135deg, #fff59d 0%, #ffcc80 100%);
  }

  .score-section--quiz {
    background: linear-gradient(135deg, #90caf9 0%, #64b5f6 100%);
  }

  .score-section--chase {
    background: linear-gradient(135deg, #a5d6a7 0%, #81c784 100%);
  }

  .score-section__head {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.35rem;
  }

  .score-section__icon {
    font-size: 1.35rem;
    line-height: 1;
  }

  .score-section__title {
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    font-weight: 700;
    color: #4a148c;
  }

  .score-section__body {
    font-size: clamp(0.88rem, 3vw, 0.98rem);
    font-weight: 600;
    color: #333;
    line-height: 1.45;
  }

  .score-section--muted .score-section__body {
    color: #555;
    font-weight: 500;
  }

  .score-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.4rem;
  }

  .score-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 2.1rem;
    padding: 0.35rem 0.5rem;
    border-radius: 10px;
    font-size: 1.05rem;
    font-weight: 800;
    background: #fff;
    color: #6a1b9a;
    border: 2px solid rgba(106, 27, 154, 0.25);
    box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
  }

  .score-celebrate {
    font-size: 0.95rem;
    font-weight: 700;
    color: #1b5e20;
  }

  @media (prefers-reduced-motion: reduce) {
    .session-end-card::before,
    .session-end-card::after { opacity: 0.5; }
  }

  .session-end-home {
    display: block;
    text-align: center;
    font-weight: 600;
    font-size: 1rem;
    padding: 12px 16px;
    border-radius: 999px;
    background: #7c4dff;
    color: #fff;
    text-decoration: none;
    box-shadow: 0 3px 0 #5e35b1;
  }

  .session-end-home:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #5e35b1;
  }
</style>
</head>
<body>

<div id="play-timer" role="status" aria-live="polite" aria-atomic="true"></div>

<div id="session-end-overlay" aria-modal="true" role="dialog" aria-labelledby="session-end-title" aria-hidden="true">
  <div class="session-end-card">
    <h2 id="session-end-title">Time's up!</h2>
    <p class="session-end-sub">You did awesome — here's your scoreboard!</p>
    <div class="session-end-stats" id="session-end-stats"></div>
    <a href="index.html" class="session-end-home" id="session-end-home">Back to home</a>
  </div>
</div>

<a href="index.html" class="home-btn" id="link-home" aria-label="Back to games">← Home</a>
<div id="mode-buttons">
  <button class="mode-btn active" data-mode="freeplay">Free Play</button>
  <button class="mode-btn" data-mode="quiz">Quiz</button>
  <button class="mode-btn" data-mode="chase">Chase</button>
</div>
<div id="display-area">
  <div id="hint">Press any letter or number!</div>
  <div id="letter"></div>
</div>
<div id="touch-grid"></div>
<div id="chase-arena"></div>
<div id="thumbs-down">👎</div>
<div id="confetti-container"></div>

<script>
const COLORS = [
  '#e53935', '#ff6d00', '#ffab00', '#43a047',
  '#1e88e5', '#8e24aa', '#d81b60', '#00897b',
  '#3949ab', '#f4511e'
];

const NUMBER_WORDS = {
  '0': 'zero', '1': 'one', '2': 'two', '3': 'three', '4': 'four',
  '5': 'five', '6': 'six', '7': 'seven', '8': 'eight', '9': 'nine'
};

const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

const SESSION_KEY = 'ariaAlphabetSession';
const STATS_KEY = 'ariaAlphabetStats';
const PORTAL_TIMER_KEY = 'ariaPortalPlayTimer';
const PLAY_LIMIT_UI_KEY = 'ariaPortalPlayLimitUi';

function defaultStats() {
  return {
    freeChars: 0,
    quizCorrect: 0,
    chaseCorrect: 0,
    quizStruggled: [],
    chaseStruggled: [],
    visitedFreeplay: false,
    visitedQuiz: false,
    visitedChase: false
  };
}

function normalizeStats(parsed) {
  const d = defaultStats();
  if (!parsed || typeof parsed !== 'object') return d;
  return {
    ...d,
    ...parsed,
    quizStruggled: Array.isArray(parsed.quizStruggled) ? parsed.quizStruggled : [],
    chaseStruggled: Array.isArray(parsed.chaseStruggled) ? parsed.chaseStruggled : [],
    visitedFreeplay: !!parsed.visitedFreeplay,
    visitedQuiz: !!parsed.visitedQuiz,
    visitedChase: !!parsed.visitedChase
  };
}

let playLimitEndsAt = null;
let sessionEnded = false;
let sessionTickId = null;
let stats = defaultStats();

function shouldTrackStats() {
  return playLimitEndsAt != null && !sessionEnded;
}

function persistStats() {
  if (!shouldTrackStats()) return;
  try {
    sessionStorage.setItem(STATS_KEY, JSON.stringify(stats));
  } catch (_) {}
}

function bumpStat(field) {
  if (!shouldTrackStats()) return;
  stats[field]++;
  if (field === 'freeChars') stats.visitedFreeplay = true;
  persistStats();
}

function addQuizStruggle(char) {
  if (!shouldTrackStats() || char == null || char === '') return;
  const ch = String(char).toUpperCase();
  if (!stats.quizStruggled.includes(ch)) stats.quizStruggled.push(ch);
  persistStats();
}

function addChaseStruggle() {
  if (!shouldTrackStats() || chaseTarget == null || chaseTarget === '') return;
  const ch = String(chaseTarget).toUpperCase();
  if (!stats.chaseStruggled.includes(ch)) stats.chaseStruggled.push(ch);
  persistStats();
}

function loadStatsFromStorage() {
  try {
    const raw = sessionStorage.getItem(STATS_KEY);
    stats = raw ? normalizeStats(JSON.parse(raw)) : defaultStats();
  } catch (_) {
    stats = defaultStats();
  }
}

function readPortalPlayDeadline() {
  try {
    const raw = sessionStorage.getItem(PORTAL_TIMER_KEY);
    if (!raw) return null;
    const o = JSON.parse(raw);
    const e = o.endsAt != null ? Number(o.endsAt) : null;
    if (e == null || isNaN(e) || Date.now() >= e) return null;
    return e;
  } catch (_) {
    return null;
  }
}

function clearPlaySessionStorage(alsoClearPortalTimer) {
  try {
    sessionStorage.removeItem(SESSION_KEY);
    sessionStorage.removeItem(STATS_KEY);
    if (alsoClearPortalTimer) {
      sessionStorage.removeItem(PORTAL_TIMER_KEY);
      sessionStorage.removeItem(PLAY_LIMIT_UI_KEY);
    }
  } catch (_) {}
}

function initPlaySession() {
  try {
    const portalDeadline = readPortalPlayDeadline();
    const raw = sessionStorage.getItem(SESSION_KEY);
    let endsAt = null;
    let startedAt = Date.now();

    if (portalDeadline != null) {
      endsAt = portalDeadline;
      if (raw) {
        try {
          const s = JSON.parse(raw);
          if (s.startedAt != null && !isNaN(Number(s.startedAt))) startedAt = Number(s.startedAt);
        } catch (_) {}
      }
      try {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ endsAt, startedAt }));
      } catch (_) {}
    } else if (raw) {
      const s = JSON.parse(raw);
      endsAt = s.endsAt != null ? Number(s.endsAt) : null;
      if (s.startedAt != null && !isNaN(Number(s.startedAt))) startedAt = Number(s.startedAt);
    } else {
      playLimitEndsAt = null;
      stats = defaultStats();
      sessionStorage.removeItem(STATS_KEY);
      return;
    }

    if (endsAt != null && (isNaN(endsAt) || Date.now() >= endsAt)) {
      playLimitEndsAt = endsAt;
      loadStatsFromStorage();
      onSessionTimeUp();
      return;
    }
    playLimitEndsAt = endsAt;
    loadStatsFromStorage();
  } catch (_) {
    playLimitEndsAt = null;
    stats = defaultStats();
  }
}

function formatTimeLeft(ms) {
  const sec = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(sec / 60);
  const r = sec % 60;
  return m + ':' + (r < 10 ? '0' : '') + r;
}

function onSessionTimeUp() {
  if (sessionEnded) return;
  sessionEnded = true;
  try {
    sessionStorage.removeItem(PORTAL_TIMER_KEY);
    sessionStorage.removeItem(PLAY_LIMIT_UI_KEY);
  } catch (_) {}
  if (sessionTickId != null) {
    clearInterval(sessionTickId);
    sessionTickId = null;
  }
  loadStatsFromStorage();
  stopAlphabetsGame();
  document.body.classList.add('session-ended');
  const timerEl = document.getElementById('play-timer');
  timerEl.classList.remove('is-visible');
  timerEl.textContent = '';
  const overlay = document.getElementById('session-end-overlay');
  overlay.setAttribute('aria-hidden', 'false');
  const board = document.getElementById('session-end-stats');
  board.innerHTML = '';

  function addScoreSection(modClass, icon, title, bodyEl) {
    const sec = document.createElement('div');
    sec.className = 'score-section ' + modClass;
    const head = document.createElement('div');
    head.className = 'score-section__head';
    const ic = document.createElement('span');
    ic.className = 'score-section__icon';
    ic.setAttribute('aria-hidden', 'true');
    ic.textContent = icon;
    const ttl = document.createElement('div');
    ttl.className = 'score-section__title';
    ttl.textContent = title;
    head.appendChild(ic);
    head.appendChild(ttl);
    const body = document.createElement('div');
    body.className = 'score-section__body';
    body.appendChild(bodyEl);
    sec.appendChild(head);
    sec.appendChild(body);
    board.appendChild(sec);
  }

  function addMutedSection(modClass, icon, title, message) {
    const sec = document.createElement('div');
    sec.className = 'score-section score-section--muted ' + modClass;
    const head = document.createElement('div');
    head.className = 'score-section__head';
    const ic = document.createElement('span');
    ic.className = 'score-section__icon';
    ic.setAttribute('aria-hidden', 'true');
    ic.textContent = icon;
    const ttl = document.createElement('div');
    ttl.className = 'score-section__title';
    ttl.textContent = title;
    head.appendChild(ic);
    head.appendChild(ttl);
    const body = document.createElement('div');
    body.className = 'score-section__body';
    body.textContent = message;
    sec.appendChild(head);
    sec.appendChild(body);
    board.appendChild(sec);
  }

  function pillsForChars(arr) {
    const wrap = document.createElement('div');
    wrap.className = 'score-pills';
    arr.forEach(function(ch) {
      const pill = document.createElement('span');
      pill.className = 'score-pill';
      pill.textContent = ch;
      wrap.appendChild(pill);
    });
    return wrap;
  }

  /* Free play */
  if (!stats.visitedFreeplay) {
    addMutedSection('score-section--free', '🎨', 'Free play', 'This mode was not accessed during this play session.');
  } else if (stats.freeChars === 0) {
    const line = document.createElement('span');
    line.textContent = 'You opened Free play — next time, tap lots of letters and numbers to fill the rainbow! 🌈';
    addScoreSection('score-section--free', '🎨', 'Free play', line);
  } else {
    const fc = stats.freeChars;
    const line = document.createElement('span');
    line.textContent = 'You explored ' + fc + ' ' + (fc === 1 ? 'letter or number' : 'letters & numbers') + '! 🌈';
    addScoreSection('score-section--free', '🎨', 'Free play', line);
  }

  /* Quiz */
  if (!stats.visitedQuiz) {
    addMutedSection('score-section--quiz', '🧠', 'Quiz', 'This mode was not accessed during this play session.');
  } else {
    const wrap = document.createDocumentFragment();
    const line = document.createElement('div');
    if (stats.quizCorrect > 0) {
      line.textContent = 'Nice work — ' + stats.quizCorrect + ' quiz ' + (stats.quizCorrect === 1 ? 'round' : 'rounds') + ' solved!';
    } else if (stats.quizStruggled.length > 0) {
      line.textContent = 'You were practicing — keep going next time!';
    } else {
      line.textContent = 'You opened Quiz — try solving puzzles next time! 🧩';
    }
    wrap.appendChild(line);
    if (stats.quizStruggled.length === 0) {
      if (stats.quizCorrect > 0) {
        const cheer = document.createElement('div');
        cheer.className = 'score-celebrate';
        cheer.textContent = 'Every answer was first try — you are a star! ⭐';
        wrap.appendChild(cheer);
      }
    } else {
      const sub = document.createElement('div');
      sub.style.marginTop = '0.45rem';
      sub.style.fontWeight = '600';
      sub.textContent = stats.quizCorrect > 0
        ? 'These took an extra try (you got them!):'
        : 'These letters or numbers needed another try:';
      wrap.appendChild(sub);
      wrap.appendChild(pillsForChars(stats.quizStruggled));
    }
    const holder = document.createElement('div');
    holder.appendChild(wrap);
    addScoreSection('score-section--quiz', '🧠', 'Quiz', holder);
  }

  /* Chase */
  if (!stats.visitedChase) {
    addMutedSection('score-section--chase', '🏃', 'Chase', 'This mode was not accessed during this play session.');
  } else {
    const wrap = document.createDocumentFragment();
    const line = document.createElement('div');
    if (stats.chaseCorrect > 0) {
      line.textContent = 'You caught the target ' + stats.chaseCorrect + ' ' + (stats.chaseCorrect === 1 ? 'time' : 'times') + '!';
    } else if (stats.chaseStruggled.length > 0) {
      line.textContent = 'You were chasing — nice effort!';
    } else {
      line.textContent = 'You opened Chase — tap the right letter next time! 🎯';
    }
    wrap.appendChild(line);
    if (stats.chaseStruggled.length === 0) {
      if (stats.chaseCorrect > 0) {
        const cheer = document.createElement('div');
        cheer.className = 'score-celebrate';
        cheer.textContent = 'No mix-ups — sharp tapping! 🎯';
        wrap.appendChild(cheer);
      }
    } else {
      const sub = document.createElement('div');
      sub.style.marginTop = '0.45rem';
      sub.style.fontWeight = '600';
      sub.textContent = stats.chaseCorrect > 0
        ? 'These targets needed another tap or two:'
        : 'These targets were tricky to catch:';
      wrap.appendChild(sub);
      wrap.appendChild(pillsForChars(stats.chaseStruggled));
    }
    const holder = document.createElement('div');
    holder.appendChild(wrap);
    addScoreSection('score-section--chase', '🏃', 'Chase', holder);
  }

  speechSynthesis.cancel();
}

function updatePlayTimerUi() {
  const el = document.getElementById('play-timer');
  if (!playLimitEndsAt || sessionEnded) {
    el.classList.remove('is-visible');
    el.textContent = '';
    return;
  }
  const left = playLimitEndsAt - Date.now();
  if (left <= 0) {
    onSessionTimeUp();
    return;
  }
  el.classList.add('is-visible');
  el.textContent = formatTimeLeft(left) + ' left';
}

function startSessionTimerIfNeeded() {
  if (!playLimitEndsAt || sessionEnded) return;
  updatePlayTimerUi();
  sessionTickId = setInterval(updatePlayTimerUi, 500);
}

const hint = document.getElementById('hint');
const letter = document.getElementById('letter');
const modeBtns = document.querySelectorAll('.mode-btn');
const thumbsDown = document.getElementById('thumbs-down');
const touchGrid = document.getElementById('touch-grid');
const isTouch = window.matchMedia('(pointer: coarse)').matches;

let lastColor = '';
let mode = 'freeplay';
let currentTarget = '';
let quizLocked = false;
let fadeTimer = null;
let delayedQuizTimer = null;
let delayedChaseTimer = null;
let thumbsDownTimer = null;

const chaseArena = document.getElementById('chase-arena');
let chaseDifficulty = 0;
let chaseChars = [];
let chaseAnimId = null;
let chaseTarget = '';
let chasePaused = false;
let chaseRepeatId = null;
let lastFrameTime = 0;

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playChime() {
  const ctx = getAudioCtx();
  const notes = [523.25, 659.25, 783.99];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = 0.15;
    gain.gain.setTargetAtTime(0, ctx.currentTime + i * 0.1 + 0.08, 0.02);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.1);
    osc.stop(ctx.currentTime + i * 0.1 + 0.2);
  });
}

function playBuzzer() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = 200;
  gain.gain.value = 0.08;
  gain.gain.setTargetAtTime(0, ctx.currentTime + 0.25, 0.03);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.35);
}

function spawnConfetti() {
  const count = 60;
  const shapes = ['square', 'circle'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';

    const size = 8 + Math.random() * 14;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    if (shapes[Math.floor(Math.random() * 2)] === 'circle') {
      el.style.borderRadius = '50%';
    }

    el.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];

    el.style.left = '50vw';
    el.style.top = '50vh';

    const angle = Math.random() * 2 * Math.PI;
    const dist = 40 + Math.random() * 55;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const rot = Math.random() * 720 - 360;
    const duration = 1.0 + Math.random() * 0.8;

    el.style.setProperty('--tx', tx + 'vw');
    el.style.setProperty('--ty', ty + 'vh');
    el.style.setProperty('--rot', rot + 'deg');
    el.style.setProperty('--duration', duration + 's');

    document.body.appendChild(el);

    setTimeout(() => el.remove(), duration * 1000 + 50);
  }
}

function showCelebrationEmojis() {
  const emojis = ['👍', '🎉'];
  const positions = [
    { left: '15vw', top: '25vh' },
    { right: '15vw', top: '25vh' },
  ];
  emojis.forEach((emoji, i) => {
    const el = document.createElement('div');
    el.className = 'celebration-emoji';
    el.textContent = emoji;
    Object.assign(el.style, positions[i]);
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  });
}

function pickColor() {
  let color;
  do {
    color = COLORS[Math.floor(Math.random() * COLORS.length)];
  } while (color === lastColor);
  lastColor = color;
  return color;
}

function showChar(ch, color) {
  clearTimeout(fadeTimer);
  hint.style.display = 'none';
  letter.style.display = 'block';
  letter.style.opacity = '1';
  letter.textContent = ch;
  letter.style.color = color;
  letter.classList.remove('pop', 'fade-out');
  void letter.offsetWidth;
  letter.classList.add('pop');
}

function scheduleFade() {
  clearTimeout(fadeTimer);
  fadeTimer = setTimeout(() => {
    letter.classList.add('fade-out');
  }, 1500);
}

function speakChar(ch) {
  speechSynthesis.cancel();
  const text = NUMBER_WORDS[ch] || ch.toLowerCase();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function pickQuizTarget() {
  let ch;
  do {
    ch = CHARS[Math.floor(Math.random() * CHARS.length)];
  } while (ch === currentTarget);
  currentTarget = ch;
}

function startQuizRound() {
  quizLocked = false;
  thumbsDown.style.display = 'none';
  pickQuizTarget();
  showChar(currentTarget, pickColor());
  speakChar(currentTarget);
}

function showThumbsDown() {
  thumbsDown.style.display = 'block';
  thumbsDown.style.animation = 'none';
  void thumbsDown.offsetWidth;
  thumbsDown.style.animation = 'shake 0.4s ease-out';
  clearTimeout(thumbsDownTimer);
  thumbsDownTimer = setTimeout(() => {
    thumbsDownTimer = null;
    thumbsDown.style.display = 'none';
  }, 800);
}

function getChaseParams() {
  const count = Math.min(3 + Math.floor(chaseDifficulty / 2), 8);
  const speed = 100 + chaseDifficulty * 10;
  const fontSize = Math.max(10, 18 - count);
  return { count, speed, fontSize };
}

function startChaseRound() {
  if (chaseAnimId) { cancelAnimationFrame(chaseAnimId); chaseAnimId = null; }
  chasePaused = false;
  thumbsDown.style.display = 'none';
  chaseChars.forEach(c => c.el.remove());
  chaseChars = [];

  const { count, speed, fontSize } = getChaseParams();
  const shuffled = CHARS.split('').sort(() => Math.random() - 0.5).slice(0, count);
  const colors = [...COLORS].sort(() => Math.random() - 0.5);
  chaseTarget = shuffled[Math.floor(Math.random() * shuffled.length)];

  shuffled.forEach((ch, i) => {
    const el = document.createElement('div');
    el.className = 'chase-char';
    el.textContent = ch;
    el.style.fontSize = fontSize + 'vmin';
    el.style.color = colors[i % colors.length];
    chaseArena.appendChild(el);
    chaseChars.push({ el, ch, x: 0, y: 0, vx: 0, vy: 0, w: 0, h: 0 });
  });

  requestAnimationFrame(() => {
    if (mode !== 'chase') return;
    chaseChars.forEach(c => {
      c.w = c.el.offsetWidth;
      c.h = c.el.offsetHeight;
      c.x = Math.random() * (window.innerWidth - c.w);
      c.y = Math.random() * (window.innerHeight - c.h);
      const angle = Math.random() * 2 * Math.PI;
      c.vx = Math.cos(angle) * speed;
      c.vy = Math.sin(angle) * speed;
      c.el.style.left = c.x + 'px';
      c.el.style.top = c.y + 'px';
    });
    lastFrameTime = 0;
    chaseAnimId = requestAnimationFrame(animateChase);
  });

  speakChar(chaseTarget);
  clearInterval(chaseRepeatId);
  chaseRepeatId = setInterval(() => {
    if (!chasePaused) {
      const text = NUMBER_WORDS[chaseTarget] || chaseTarget.toLowerCase();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.9;
      speechSynthesis.speak(u);
    }
  }, 5000);
}

function animateChase(timestamp) {
  if (mode !== 'chase' || chaseChars.length === 0) {
    chaseAnimId = null;
    return;
  }

  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
  lastFrameTime = timestamp;

  if (!chasePaused) {
    const W = window.innerWidth;
    const H = window.innerHeight;
    chaseChars.forEach(c => {
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      if (c.x < 0) { c.x = 0; c.vx = Math.abs(c.vx); }
      if (c.y < 0) { c.y = 0; c.vy = Math.abs(c.vy); }
      if (c.x + c.w > W) { c.x = W - c.w; c.vx = -Math.abs(c.vx); }
      if (c.y + c.h > H) { c.y = H - c.h; c.vy = -Math.abs(c.vy); }
      c.el.style.left = c.x + 'px';
      c.el.style.top = c.y + 'px';
    });

    for (let i = 0; i < chaseChars.length; i++) {
      for (let j = i + 1; j < chaseChars.length; j++) {
        const a = chaseChars[i], b = chaseChars[j];
        const overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
        const overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
        if (overlapX > 0 && overlapY > 0) {
          if (overlapX < overlapY) {
            const half = overlapX / 2;
            if (a.x < b.x) { a.x -= half; b.x += half; }
            else { a.x += half; b.x -= half; }
            const tmp = a.vx; a.vx = b.vx; b.vx = tmp;
          } else {
            const half = overlapY / 2;
            if (a.y < b.y) { a.y -= half; b.y += half; }
            else { a.y += half; b.y -= half; }
            const tmp = a.vy; a.vy = b.vy; b.vy = tmp;
          }
          a.el.style.left = a.x + 'px'; a.el.style.top = a.y + 'px';
          b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
        }
      }
    }
  }

  if (mode === 'chase' && chaseChars.length > 0) {
    chaseAnimId = requestAnimationFrame(animateChase);
  } else {
    chaseAnimId = null;
  }
}

function onChaseClick(e) {
  if (sessionEnded) return;
  if (chasePaused) return;

  const x = e.clientX;
  const y = e.clientY;
  const margin = 30;

  const hits = chaseChars.filter(c =>
    x >= c.x - margin && x <= c.x + c.w + margin &&
    y >= c.y - margin && y <= c.y + c.h + margin
  );

  if (hits.length === 0) return;

  if (hits.some(c => c.ch === chaseTarget)) {
    bumpStat('chaseCorrect');
    chasePaused = true;
    chaseDifficulty = Math.min(chaseDifficulty + 1, 15);
    spawnConfetti();
    showCelebrationEmojis();
    playChime();
    clearTimeout(delayedChaseTimer);
    delayedChaseTimer = setTimeout(() => {
      delayedChaseTimer = null;
      startChaseRound();
    }, 2000);
  } else {
    addChaseStruggle();
    chaseDifficulty = Math.max(chaseDifficulty - 1, 0);
    showThumbsDown();
    playBuzzer();
  }
}

chaseArena.addEventListener('click', onChaseClick);

function stopChase() {
  if (chaseAnimId) { cancelAnimationFrame(chaseAnimId); chaseAnimId = null; }
  clearInterval(chaseRepeatId);
  chaseRepeatId = null;
  chaseChars.forEach(c => c.el.remove());
  chaseChars = [];
}

function stopAlphabetsGame() {
  speechSynthesis.cancel();
  clearTimeout(fadeTimer);
  fadeTimer = null;
  clearTimeout(delayedQuizTimer);
  delayedQuizTimer = null;
  clearTimeout(delayedChaseTimer);
  delayedChaseTimer = null;
  clearTimeout(thumbsDownTimer);
  thumbsDownTimer = null;
  stopChase();
}

function setMode(newMode) {
  if (sessionEnded) return;
  if (mode === 'chase') stopChase();

  mode = newMode;
  modeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
  thumbsDown.style.display = 'none';
  quizLocked = false;

  const inChase = mode === 'chase';
  document.getElementById('display-area').style.display = inChase ? 'none' : '';
  touchGrid.style.display = inChase ? 'none' : '';
  chaseArena.style.display = inChase ? 'block' : 'none';

  if (mode === 'quiz') {
    startQuizRound();
  } else if (mode === 'chase') {
    chaseDifficulty = 0;
    startChaseRound();
  } else {
    letter.style.display = 'none';
    hint.style.display = 'block';
    hint.textContent = isTouch ? 'Tap any letter or number!' : 'Press any letter or number!';
    currentTarget = '';
  }

  if (shouldTrackStats()) {
    if (mode === 'freeplay') stats.visitedFreeplay = true;
    else if (mode === 'quiz') stats.visitedQuiz = true;
    else if (mode === 'chase') stats.visitedChase = true;
    persistStats();
  }
}

modeBtns.forEach(btn => {
  btn.addEventListener('click', function() {
    setMode(btn.dataset.mode);
    btn.blur();
  });
});

function handleChar(key) {
  if (sessionEnded) return;
  if (mode === 'chase') return;
  if (mode === 'freeplay') {
    bumpStat('freeChars');
    showChar(key, pickColor());
    speakChar(key);
    scheduleFade();
  } else {
    if (quizLocked) return;
    if (key === currentTarget) {
      bumpStat('quizCorrect');
      quizLocked = true;
      spawnConfetti();
      showCelebrationEmojis();
      playChime();
      clearTimeout(delayedQuizTimer);
      delayedQuizTimer = setTimeout(() => {
        delayedQuizTimer = null;
        startQuizRound();
      }, 2000);
    } else {
      addQuizStruggle(currentTarget);
      showThumbsDown();
      playBuzzer();
    }
  }
}

CHARS.split('').forEach(ch => {
  const btn = document.createElement('button');
  btn.className = 'grid-btn';
  btn.textContent = ch;
  btn.addEventListener('click', () => handleChar(ch));
  touchGrid.appendChild(btn);
});

if (isTouch) {
  hint.textContent = 'Tap any letter or number!';
}

initPlaySession();
startSessionTimerIfNeeded();

document.addEventListener('keydown', function(e) {
  if (sessionEnded) return;
  if (e.metaKey || e.ctrlKey || e.altKey || e.repeat) return;
  const key = e.key.toUpperCase();
  if (!/^[A-Z0-9]$/.test(key)) return;
  e.preventDefault();
  handleChar(key);
});

window.addEventListener('pagehide', function() {
  stopAlphabetsGame();
});

window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    stopAlphabetsGame();
    setMode('freeplay');
  }
});

document.getElementById('link-home').addEventListener('click', function() {
  stopAlphabetsGame();
  clearPlaySessionStorage(false);
});

document.getElementById('session-end-home').addEventListener('click', function() {
  clearPlaySessionStorage(true);
});
</script>
</body>

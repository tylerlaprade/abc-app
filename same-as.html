<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Same As — Aria's Playroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    height: 100dvh;
    overflow-x: hidden;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: system-ui, -apple-system, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    background: linear-gradient(180deg, #e0f7fa 0%, #b2ebf2 42%, #80deea 100%);
    padding: 52px 12px 16px;
  }

  body.session-ended {
    pointer-events: none;
  }

  body.session-ended #session-end-overlay,
  body.session-ended #session-end-overlay * {
    pointer-events: auto;
  }

  .home-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 150;
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 999px;
    border: 3px solid #006064;
    background: #fff;
    color: #004d40;
    text-decoration: none;
    box-shadow: 0 3px 0 #004d40;
    -webkit-tap-highlight-color: transparent;
  }

  .home-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #004d40;
  }

  #category-buttons {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 6px;
    max-width: 58vw;
  }

  .cat-btn {
    background: #eee;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    font-family: system-ui, -apple-system, sans-serif;
    color: #666;
    cursor: pointer;
  }
  .cat-btn:hover { background: #ddd; }
  .cat-btn.active {
    background: #00838f;
    border-color: #006064;
    color: #fff;
  }
  .cat-btn.active { pointer-events: none; }

  #app-main {
    width: min(92vw, 720px);
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: clamp(8px, 2vw, 14px);
  }

  .match-board {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: clamp(10px, 2.5vw, 18px);
    padding: 4px 0 8px;
  }

  .match-ref-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(6px, 1.5vw, 10px);
    flex: 0 0 auto;
  }

  .match-cue {
    font-size: clamp(2rem, 10vmin, 3rem);
    line-height: 1;
    filter: drop-shadow(0 2px 0 rgba(0, 77, 64, 0.15));
  }

  .match-ref-card {
    width: min(88vw, 22rem);
    aspect-ratio: 1;
    max-height: min(38vh, 22rem);
    margin-inline: auto;
    border-radius: 24px;
    border: 5px solid #fff;
    background: linear-gradient(165deg, #fff 0%, #e0f7fa 100%);
    box-shadow: 0 8px 0 #00838f, 0 14px 28px rgba(0, 0, 0, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 3vw, 22px);
  }

  .match-ref-card__art {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
    font-size: clamp(4rem, min(28vmin, 22vw), 9rem);
    line-height: 1;
    filter: drop-shadow(0 3px 0 rgba(0, 131, 143, 0.2));
  }

  .match-ref-card__art .shape-tile-svg {
    height: min(72vmin, 14rem);
    width: auto;
    max-width: 100%;
    display: block;
  }

  .match-actions {
    display: flex;
    justify-content: center;
    flex: 0 0 auto;
  }

  .match-prompt-btn {
    width: min(28vmin, 8.5rem);
    height: min(28vmin, 8.5rem);
    min-width: 6.25rem;
    min-height: 6.25rem;
    border-radius: 50%;
    border: 4px solid #00838f;
    background: linear-gradient(165deg, #fff 0%, #e0f7fa 55%, #b2ebf2 100%);
    box-shadow: 0 6px 0 #006064, 0 10px 24px rgba(0, 77, 64, 0.15);
    font-size: min(16vmin, 3.75rem);
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .match-prompt-btn:active {
    transform: translateY(3px) scale(0.98);
    box-shadow: 0 3px 0 #006064;
  }

  .match-choices {
    flex: 1 1 auto;
    min-height: min(42dvh, 16rem);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(10px, 2.5vw, 16px);
    align-items: stretch;
  }

  @media (max-width: 420px) {
    .match-choices {
      grid-template-columns: 1fr;
      min-height: 0;
    }
  }

  .match-choice {
    border-radius: 22px;
    border: 5px solid #fff;
    background: linear-gradient(165deg, #fff 0%, #e0f7fa 100%);
    box-shadow: 0 6px 0 #00838f, 0 12px 24px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    padding: clamp(12px, 3vw, 20px);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: clamp(10rem, 32vmin, 14rem);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .match-choice:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #00838f, 0 14px 28px rgba(0, 0, 0, 0.12);
  }

  .match-choice:active {
    transform: translateY(2px);
    box-shadow: 0 4px 0 #00838f;
  }

  .match-choice.pop {
    animation: match-pop 0.28s ease-out;
  }

  @keyframes match-pop {
    0% { transform: scale(0.94); }
    55% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .match-choice { transition: none; }
    .match-choice:hover { transform: none; }
    .match-choice.pop { animation: none; }
  }

  .match-choice__art {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
    font-size: clamp(3.5rem, min(24vmin, 20vw), 7.5rem);
    line-height: 1;
    pointer-events: none;
    filter: drop-shadow(0 3px 0 rgba(0, 131, 143, 0.18));
  }

  .match-choice__art .shape-tile-svg {
    height: min(52vmin, 11rem);
    width: auto;
    max-width: 100%;
    display: block;
  }

  .match-choice:disabled {
    opacity: 1;
    cursor: default;
  }

  .match-choice--locked {
    pointer-events: none;
  }

  #play-timer {
    display: none;
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 140;
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(0, 131, 143, 0.92);
    color: #fff;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    pointer-events: none;
  }

  #play-timer.is-visible { display: block; }

  #session-end-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(0, 0, 0, 0.45);
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  body.session-ended #session-end-overlay { display: flex; }

  .session-end-card {
    max-width: 24rem;
    width: 100%;
    background: linear-gradient(160deg, #e0f7fa 0%, #b2ebf2 40%, #80deea 100%);
    border-radius: 24px;
    padding: clamp(1.35rem, 4vw, 1.85rem);
    font-family: "Fredoka", system-ui, sans-serif;
    box-shadow: 0 4px 0 #00838f, 0 16px 48px rgba(0, 0, 0, 0.2);
    border: 4px solid #fff;
  }

  .session-end-card h2 {
    font-size: clamp(1.5rem, 5.5vw, 1.85rem);
    color: #004d40;
    margin-bottom: 0.25rem;
    text-align: center;
  }

  .session-end-card .session-end-sub {
    font-size: clamp(0.95rem, 3.2vw, 1.05rem);
    font-weight: 600;
    color: #006064;
    text-align: center;
    margin-bottom: 1.1rem;
  }

  .session-end-stats {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin: 0 0 1.2rem;
  }

  .score-section {
    border-radius: 16px;
    padding: 0.75rem 0.85rem;
    border: 3px solid rgba(255, 255, 255, 0.95);
    box-shadow: 0 3px 0 rgba(0, 0, 0, 0.08);
    background: linear-gradient(135deg, #fff 0%, #e0f7fa 100%);
  }

  .score-section__head {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.35rem;
  }

  .score-section__icon {
    font-size: 1.35rem;
    line-height: 1;
  }

  .score-section__title {
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    font-weight: 700;
    color: #004d40;
  }

  .score-section__body {
    font-size: clamp(0.88rem, 3vw, 0.98rem);
    font-weight: 600;
    color: #333;
    line-height: 1.45;
  }

  .session-end-home {
    display: block;
    text-align: center;
    font-weight: 600;
    font-size: 1rem;
    padding: 12px 16px;
    border-radius: 999px;
    background: #00838f;
    color: #fff;
    text-decoration: none;
    box-shadow: 0 3px 0 #006064;
  }

  #thumbs-down {
    position: fixed;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15vw;
    display: none;
    z-index: 50;
    animation: td-shake 0.4s ease-out;
    pointer-events: none;
  }

  @keyframes td-shake {
    0%, 100% { transform: translateX(-50%) rotate(0deg); }
    25% { transform: translateX(-50%) rotate(-8deg); }
    75% { transform: translateX(-50%) rotate(8deg); }
  }

  .celebration-emoji {
    position: fixed;
    z-index: 55;
    font-size: 12vw;
    pointer-events: none;
    animation: emoji-pop 1.5s ease-out forwards;
  }

  @keyframes emoji-pop {
    0%   { transform: scale(0) rotate(-20deg); opacity: 1; }
    30%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
    50%  { transform: scale(1) rotate(0deg); opacity: 1; }
    100% { transform: scale(1.3) rotate(10deg); opacity: 0; }
  }

  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 60;
    animation: confetti-burst var(--duration) ease-out forwards;
  }

  @keyframes confetti-burst {
    0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity: 0; }
  }
</style>
</head>
<body>

<div id="play-timer" role="status" aria-live="polite" aria-atomic="true"></div>

<div id="session-end-overlay" aria-modal="true" role="dialog" aria-labelledby="session-end-title" aria-hidden="true">
  <div class="session-end-card">
    <h2 id="session-end-title">Time's up!</h2>
    <p class="session-end-sub">Here's how your matching went!</p>
    <div class="session-end-stats" id="session-end-stats"></div>
    <a href="index.html" class="session-end-home" id="session-end-home">Back to home</a>
  </div>
</div>

<a href="index.html" class="home-btn" id="link-home" aria-label="Back to games">← Home</a>

<div id="category-buttons">
  <button type="button" class="cat-btn active" data-cat="animals">Animals</button>
  <button type="button" class="cat-btn" data-cat="shapes">Shapes</button>
</div>

<main id="app-main">
  <div class="match-board">
    <div class="match-ref-wrap">
      <div class="match-ref-card" id="ref-card" aria-hidden="true">
        <div class="match-ref-card__art" id="ref-art"></div>
      </div>
      <div class="match-cue" aria-hidden="true" title="Same">🟰</div>
    </div>
    <div class="match-actions">
      <button type="button" class="match-prompt-btn" id="prompt-replay" aria-label="Play the question out loud">🔊</button>
    </div>
    <div class="match-choices">
      <button type="button" class="match-choice" id="choice-left" aria-label="First choice">
        <span class="match-choice__art" id="choice-left-art"></span>
      </button>
      <button type="button" class="match-choice" id="choice-right" aria-label="Second choice">
        <span class="match-choice__art" id="choice-right-art"></span>
      </button>
    </div>
  </div>
</main>

<div id="thumbs-down" aria-hidden="true">👎</div>

<script>
function makeShapeSvg(kind, fill) {
  var r;
  var k;
  var t;
  var x;
  var y;
  var d;
  var open =
    '<svg class="shape-tile-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">';
  var close = '</svg>';
  if (kind === 'pentagon') {
    r = 46;
    d = '';
    for (k = 0; k < 5; k++) {
      t = -Math.PI / 2 + (2 * Math.PI * k) / 5;
      x = 50 + r * Math.cos(t);
      y = 50 + r * Math.sin(t);
      d += (k === 0 ? 'M' : 'L') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
    }
    return open + '<path d="' + d + 'Z" fill="' + fill + '" />' + close;
  }
  if (kind === 'hexagon') {
    r = 45;
    d = '';
    for (k = 0; k < 6; k++) {
      t = -Math.PI / 2 + (2 * Math.PI * k) / 6;
      x = 50 + r * Math.cos(t);
      y = 50 + r * Math.sin(t);
      d += (k === 0 ? 'M' : 'L') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
    }
    return open + '<path d="' + d + 'Z" fill="' + fill + '" />' + close;
  }
  if (kind === 'parallelogram') {
    d = 'M 6 78 L 36 22 L 94 22 L 64 78 Z';
    return open + '<path d="' + d + '" fill="' + fill + '" />' + close;
  }
  if (kind === 'trapezoid') {
    d = 'M 6 78 L 30 22 L 70 22 L 94 78 Z';
    return open + '<path d="' + d + '" fill="' + fill + '" />' + close;
  }
  if (kind === 'oval') {
    return open + '<ellipse cx="50" cy="50" rx="46" ry="30" fill="' + fill + '" />' + close;
  }
  return '';
}

const ANIMALS = [
  { key: 'pig', name: 'Pig', emoji: '🐖' },
  { key: 'rooster', name: 'Rooster', emoji: '🐓' },
  { key: 'frog', name: 'Frog', emoji: '🐸' },
  { key: 'cat', name: 'Cat', emoji: '🐈' },
  { key: 'dog', name: 'Dog', emoji: '🐕' },
  { key: 'horse', name: 'Horse', emoji: '🐎' },
  { key: 'rabbit', name: 'Rabbit', emoji: '🐇' },
  { key: 'caterpillar', name: 'Caterpillar', emoji: '🐛' },
  { key: 'sheep', name: 'Sheep', emoji: '🐑' },
  { key: 'duck', name: 'Duck', emoji: '🦆' },
  { key: 'cow', name: 'Cow', emoji: '🐄' },
  { key: 'snake', name: 'Snake', emoji: '🐍' }
];

const SHAPES = [
  { key: 'red_circle', name: 'Red circle', emoji: '🔴', say: 'Red circle' },
  { key: 'blue_circle', name: 'Blue circle', emoji: '🔵', say: 'Blue circle' },
  { key: 'red_square', name: 'Red square', emoji: '🟥', say: 'Red square' },
  { key: 'blue_square', name: 'Blue square', emoji: '🟦', say: 'Blue square' },
  { key: 'yellow_square', name: 'Yellow square', emoji: '🟨', say: 'Yellow square' },
  { key: 'red_triangle', name: 'Red triangle', emoji: '🔺', say: 'Red triangle' },
  { key: 'orange_diamond', name: 'Orange diamond', emoji: '🔶', say: 'Orange diamond' },
  { key: 'yellow_star', name: 'Yellow star', emoji: '⭐', say: 'Yellow star' },
  {
    key: 'green_pentagon',
    name: 'Green pentagon',
    emoji: '🟢',
    say: 'Green pentagon',
    svgMarkup: makeShapeSvg('pentagon', '#43a047')
  },
  {
    key: 'purple_hexagon',
    name: 'Purple hexagon',
    emoji: '🟣',
    say: 'Purple hexagon',
    svgMarkup: makeShapeSvg('hexagon', '#8e24aa')
  },
  {
    key: 'teal_parallelogram',
    name: 'Teal parallelogram',
    emoji: '🔷',
    say: 'Teal parallelogram',
    svgMarkup: makeShapeSvg('parallelogram', '#00897b')
  },
  {
    key: 'pink_trapezoid',
    name: 'Pink trapezoid',
    emoji: '💗',
    say: 'Pink trapezoid',
    svgMarkup: makeShapeSvg('trapezoid', '#d81b60')
  }
];

const CONFETTI_HEX = [
  '#00838f', '#26c6da', '#b2ebf2', '#e53935', '#43a047',
  '#8e24aa', '#ff9800', '#1e88e5'
];

const SESSION_KEY = 'ariaSameAsSession';
const STATS_KEY = 'ariaSameAsStats';
const PORTAL_TIMER_KEY = 'ariaPortalPlayTimer';
const PLAY_LIMIT_UI_KEY = 'ariaPortalPlayLimitUi';

const PROMPT_SAY = 'Which one is the same as this?';

function defaultStats() {
  return {
    matchCorrect: 0,
    matchWrong: 0,
    struggled: [],
    usedAnimals: false,
    usedShapes: false
  };
}

function normalizeStats(parsed) {
  const d = defaultStats();
  if (!parsed || typeof parsed !== 'object') return d;
  return {
    ...d,
    ...parsed,
    matchCorrect: typeof parsed.matchCorrect === 'number' ? parsed.matchCorrect : d.matchCorrect,
    matchWrong: typeof parsed.matchWrong === 'number' ? parsed.matchWrong : d.matchWrong,
    struggled: Array.isArray(parsed.struggled) ? parsed.struggled : [],
    usedAnimals: !!parsed.usedAnimals,
    usedShapes: !!parsed.usedShapes
  };
}

let playLimitEndsAt = null;
let sessionEnded = false;
let sessionTickId = null;
let stats = defaultStats();

function shouldTrackStats() {
  return playLimitEndsAt != null && !sessionEnded;
}

function persistStats() {
  if (!shouldTrackStats()) return;
  try {
    sessionStorage.setItem(STATS_KEY, JSON.stringify(stats));
  } catch (_) {}
}

function bumpCorrect() {
  if (!shouldTrackStats()) return;
  stats.matchCorrect++;
  persistStats();
}

function bumpWrong(struggleId) {
  if (!shouldTrackStats()) return;
  stats.matchWrong++;
  if (struggleId && !stats.struggled.includes(struggleId)) stats.struggled.push(struggleId);
  persistStats();
}

function loadStatsFromStorage() {
  try {
    const raw = sessionStorage.getItem(STATS_KEY);
    stats = raw ? normalizeStats(JSON.parse(raw)) : defaultStats();
  } catch (_) {
    stats = defaultStats();
  }
}

function readPortalPlayDeadline() {
  try {
    const raw = sessionStorage.getItem(PORTAL_TIMER_KEY);
    if (!raw) return null;
    const o = JSON.parse(raw);
    const e = o.endsAt != null ? Number(o.endsAt) : null;
    if (e == null || isNaN(e) || Date.now() >= e) return null;
    return e;
  } catch (_) {
    return null;
  }
}

function clearPlaySessionStorage(alsoClearPortalTimer) {
  try {
    sessionStorage.removeItem(SESSION_KEY);
    sessionStorage.removeItem(STATS_KEY);
    if (alsoClearPortalTimer) {
      sessionStorage.removeItem(PORTAL_TIMER_KEY);
      sessionStorage.removeItem(PLAY_LIMIT_UI_KEY);
    }
  } catch (_) {}
}

function initPlaySession() {
  try {
    const portalDeadline = readPortalPlayDeadline();
    const raw = sessionStorage.getItem(SESSION_KEY);
    let endsAt = null;
    let startedAt = Date.now();

    if (portalDeadline != null) {
      endsAt = portalDeadline;
      if (raw) {
        try {
          const s = JSON.parse(raw);
          if (s.startedAt != null && !isNaN(Number(s.startedAt))) startedAt = Number(s.startedAt);
        } catch (_) {}
      }
      try {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ endsAt, startedAt }));
      } catch (_) {}
    } else if (raw) {
      const s = JSON.parse(raw);
      endsAt = s.endsAt != null ? Number(s.endsAt) : null;
      if (s.startedAt != null && !isNaN(Number(s.startedAt))) startedAt = Number(s.startedAt);
    } else {
      playLimitEndsAt = null;
      stats = defaultStats();
      sessionStorage.removeItem(STATS_KEY);
      return;
    }

    if (endsAt != null && (isNaN(endsAt) || Date.now() >= endsAt)) {
      playLimitEndsAt = endsAt;
      loadStatsFromStorage();
      onSessionTimeUp();
      return;
    }
    playLimitEndsAt = endsAt;
    loadStatsFromStorage();
  } catch (_) {
    playLimitEndsAt = null;
    stats = defaultStats();
  }
}

function formatTimeLeft(ms) {
  const sec = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(sec / 60);
  const r = sec % 60;
  return m + ':' + (r < 10 ? '0' : '') + r;
}

function onSessionTimeUp() {
  if (sessionEnded) return;
  sessionEnded = true;
  try {
    sessionStorage.removeItem(PORTAL_TIMER_KEY);
    sessionStorage.removeItem(PLAY_LIMIT_UI_KEY);
  } catch (_) {}
  if (sessionTickId != null) {
    clearInterval(sessionTickId);
    sessionTickId = null;
  }
  loadStatsFromStorage();
  stopMatchGame();
  document.body.classList.add('session-ended');
  document.getElementById('play-timer').classList.remove('is-visible');
  document.getElementById('play-timer').textContent = '';
  document.getElementById('session-end-overlay').setAttribute('aria-hidden', 'false');
  const board = document.getElementById('session-end-stats');
  board.innerHTML = '';

  function addSection(icon, title, bodyText) {
    const sec = document.createElement('div');
    sec.className = 'score-section';
    const head = document.createElement('div');
    head.className = 'score-section__head';
    const ic = document.createElement('span');
    ic.className = 'score-section__icon';
    ic.setAttribute('aria-hidden', 'true');
    ic.textContent = icon;
    const ttl = document.createElement('div');
    ttl.className = 'score-section__title';
    ttl.textContent = title;
    head.appendChild(ic);
    head.appendChild(ttl);
    const body = document.createElement('div');
    body.className = 'score-section__body';
    body.textContent = bodyText;
    sec.appendChild(head);
    sec.appendChild(body);
    board.appendChild(sec);
  }

  const c = stats.matchCorrect;
  const w = stats.matchWrong;
  addSection('🧩', 'Matches', c === 0 && w === 0
    ? 'Tap the picture that looks just like the one on top!'
    : ('Nice matching — ' + c + ' correct' + (w ? ', ' + w + ' oops taps' : '') + '!'));

  const modes = [];
  if (stats.usedAnimals) modes.push('animals');
  if (stats.usedShapes) modes.push('shapes');
  if (modes.length) {
    addSection('🎯', 'Modes tried', 'You practiced with: ' + modes.join(' and ') + '.');
  }

  window.speechSynthesis.cancel();
}

function updatePlayTimerUi() {
  const el = document.getElementById('play-timer');
  if (!playLimitEndsAt || sessionEnded) {
    el.classList.remove('is-visible');
    el.textContent = '';
    return;
  }
  const left = playLimitEndsAt - Date.now();
  if (left <= 0) {
    onSessionTimeUp();
    return;
  }
  el.classList.add('is-visible');
  el.textContent = formatTimeLeft(left) + ' left';
}

function startSessionTimerIfNeeded() {
  if (!playLimitEndsAt || sessionEnded) return;
  updatePlayTimerUi();
  sessionTickId = setInterval(updatePlayTimerUi, 500);
}

const catBtns = document.querySelectorAll('.cat-btn');
const refArt = document.getElementById('ref-art');
const choiceLeft = document.getElementById('choice-left');
const choiceRight = document.getElementById('choice-right');
const choiceLeftArt = document.getElementById('choice-left-art');
const choiceRightArt = document.getElementById('choice-right-art');
const promptReplay = document.getElementById('prompt-replay');
const thumbsDown = document.getElementById('thumbs-down');

let category = 'animals';
let pool = ANIMALS;
let targetIndex = -1;
let wrongIndex = -1;
let correctIsLeft = true;
let roundLocked = false;
let delayedNextTimer = null;
let thumbsDownTimer = null;

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') {
    const p = audioCtx.resume();
    if (p && typeof p.catch === 'function') p.catch(function() {});
  }
  return audioCtx;
}

function playChime() {
  const ctx = getAudioCtx();
  [523.25, 659.25, 783.99].forEach(function(freq, i) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = 0.15;
    gain.gain.setTargetAtTime(0, ctx.currentTime + i * 0.1 + 0.08, 0.02);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.1);
    osc.stop(ctx.currentTime + i * 0.1 + 0.2);
  });
}

function playBuzzer() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = 200;
  gain.gain.value = 0.08;
  gain.gain.setTargetAtTime(0, ctx.currentTime + 0.25, 0.03);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.35);
}

(function setupIosMediaUnlock() {
  let unlocked = false;
  function once() {
    if (unlocked) return;
    unlocked = true;
    document.removeEventListener('touchstart', once, true);
    document.removeEventListener('pointerdown', once, true);
    document.removeEventListener('click', once, true);
    try {
      getAudioCtx();
    } catch (e) { /* ignore */ }
    try {
      if (window.speechSynthesis && window.speechSynthesis.getVoices) window.speechSynthesis.getVoices();
    } catch (e2) { /* ignore */ }
  }
  document.addEventListener('touchstart', once, { passive: true, capture: true });
  document.addEventListener('pointerdown', once, { passive: true, capture: true });
  document.addEventListener('click', once, { capture: true });
})();

function pickEnSpeechVoice() {
  try {
    const list = window.speechSynthesis.getVoices();
    if (!list || !list.length) return null;
    for (let i = 0; i < list.length; i++) {
      const lang = list[i].lang || '';
      if (lang.indexOf('en') === 0) return list[i];
    }
    return list[0];
  } catch (e) {
    return null;
  }
}

function speakPrompt() {
  if (sessionEnded) return;
  const synth = window.speechSynthesis;
  if (!synth) return;
  synth.cancel();
  if (synth.paused) synth.resume();
  const u = new SpeechSynthesisUtterance(PROMPT_SAY);
  u.rate = 0.88;
  const voice = pickEnSpeechVoice();
  if (voice) u.voice = voice;
  synth.speak(u);
}

function spawnConfetti() {
  for (let i = 0; i < 48; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    const size = 8 + Math.random() * 12;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    if (Math.random() > 0.5) el.style.borderRadius = '50%';
    el.style.background = CONFETTI_HEX[Math.floor(Math.random() * CONFETTI_HEX.length)];
    el.style.left = '50vw';
    el.style.top = '45vh';
    const angle = Math.random() * 2 * Math.PI;
    const dist = 35 + Math.random() * 50;
    el.style.setProperty('--tx', Math.cos(angle) * dist + 'vw');
    el.style.setProperty('--ty', Math.sin(angle) * dist + 'vh');
    el.style.setProperty('--rot', Math.random() * 720 - 360 + 'deg');
    el.style.setProperty('--duration', (0.9 + Math.random() * 0.7) + 's');
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 2000);
  }
}

function showCelebrationEmojis() {
  ['👍', '🎉'].forEach(function(emoji, i) {
    const el = document.createElement('div');
    el.className = 'celebration-emoji';
    el.textContent = emoji;
    el.style[i === 0 ? 'left' : 'right'] = '12vw';
    el.style.top = '22vh';
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 1600);
  });
}

function showThumbsDown() {
  thumbsDown.style.display = 'block';
  thumbsDown.removeAttribute('aria-hidden');
  thumbsDown.style.animation = 'none';
  void thumbsDown.offsetWidth;
  thumbsDown.style.animation = 'td-shake 0.4s ease-out';
  clearTimeout(thumbsDownTimer);
  thumbsDownTimer = setTimeout(function() {
    thumbsDownTimer = null;
    thumbsDown.style.display = 'none';
    thumbsDown.setAttribute('aria-hidden', 'true');
  }, 750);
}

function renderArt(el, item) {
  el.innerHTML = '';
  if (category === 'shapes' && item.svgMarkup) {
    el.innerHTML = item.svgMarkup;
  } else {
    const span = document.createElement('span');
    span.textContent = item.emoji;
    span.setAttribute('aria-hidden', 'true');
    el.appendChild(span);
  }
}

function pickWrongIndex(ti) {
  let w;
  let guard = 0;
  do {
    w = Math.floor(Math.random() * pool.length);
    guard++;
  } while (w === ti && pool.length > 1 && guard < 50);
  return w;
}

function struggleIdForIndex(idx) {
  const item = pool[idx];
  return (category === 'animals' ? 'a:' : 's:') + item.key;
}

function setCategory(cat) {
  category = cat;
  pool = cat === 'animals' ? ANIMALS : SHAPES;
  catBtns.forEach(function(b) {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  if (shouldTrackStats()) {
    if (cat === 'animals') stats.usedAnimals = true;
    else stats.usedShapes = true;
    persistStats();
  }
  startRound();
}

function startRound() {
  if (sessionEnded) return;
  clearTimeout(delayedNextTimer);
  delayedNextTimer = null;
  roundLocked = false;
  choiceLeft.classList.remove('match-choice--locked', 'pop');
  choiceRight.classList.remove('match-choice--locked', 'pop');
  choiceLeft.disabled = false;
  choiceRight.disabled = false;

  targetIndex = Math.floor(Math.random() * pool.length);
  wrongIndex = pickWrongIndex(targetIndex);
  correctIsLeft = Math.random() < 0.5;

  const leftIdx = correctIsLeft ? targetIndex : wrongIndex;
  const rightIdx = correctIsLeft ? wrongIndex : targetIndex;

  renderArt(refArt, pool[targetIndex]);
  renderArt(choiceLeftArt, pool[leftIdx]);
  renderArt(choiceRightArt, pool[rightIdx]);

  const leftLabel = pool[leftIdx].name + (leftIdx === targetIndex ? ' — matches top' : '');
  const rightLabel = pool[rightIdx].name + (rightIdx === targetIndex ? ' — matches top' : '');
  choiceLeft.setAttribute('aria-label', leftLabel);
  choiceRight.setAttribute('aria-label', rightLabel);

  window.speechSynthesis.cancel();
  window.setTimeout(function() {
    if (!sessionEnded) speakPrompt();
  }, 280);
}

function onChoiceTap(isLeft) {
  if (sessionEnded || roundLocked) return;
  const ok = isLeft === correctIsLeft;
  const btn = isLeft ? choiceLeft : choiceRight;

  if (ok) {
    roundLocked = true;
    bumpCorrect();
    btn.classList.remove('pop');
    void btn.offsetWidth;
    btn.classList.add('pop');
    choiceLeft.classList.add('match-choice--locked');
    choiceRight.classList.add('match-choice--locked');
    spawnConfetti();
    showCelebrationEmojis();
    playChime();
    delayedNextTimer = setTimeout(function() {
      delayedNextTimer = null;
      if (!sessionEnded) startRound();
    }, 1900);
  } else {
    bumpWrong(struggleIdForIndex(targetIndex));
    showThumbsDown();
    playBuzzer();
  }
}

choiceLeft.addEventListener('click', function() { onChoiceTap(true); });
choiceRight.addEventListener('click', function() { onChoiceTap(false); });

promptReplay.addEventListener('click', function() {
  speakPrompt();
  promptReplay.blur();
});

catBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    if (btn.dataset.cat === category) return;
    window.speechSynthesis.cancel();
    setCategory(btn.dataset.cat);
    btn.blur();
  });
});

function stopMatchGame() {
  window.speechSynthesis.cancel();
  clearTimeout(delayedNextTimer);
  delayedNextTimer = null;
  clearTimeout(thumbsDownTimer);
  thumbsDownTimer = null;
}

initPlaySession();
startSessionTimerIfNeeded();
setCategory('animals');

document.getElementById('link-home').addEventListener('click', function() {
  stopMatchGame();
  clearPlaySessionStorage(false);
});

document.getElementById('session-end-home').addEventListener('click', function() {
  clearPlaySessionStorage(true);
});

window.addEventListener('pagehide', function() {
  stopMatchGame();
});

window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    stopMatchGame();
    setCategory(category);
  }
});
</script>
